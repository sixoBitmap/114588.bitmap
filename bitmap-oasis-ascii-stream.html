<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BITMAP OASIS — ASCII STREAM</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --o:#ff6a00;--od:#cc5500;--og:rgba(255,106,0,.7);--ob:#ff8c33;
  --td:#803300;--bg:#000;--bg2:rgba(10,5,0,.97)
}
body{font-family:'Courier New',Monaco,monospace;background:#000;color:var(--o);height:100vh;overflow:hidden}

/* scanlines */
.sl{position:fixed;inset:0;background:
  repeating-linear-gradient(0deg,rgba(0,0,0,.15) 0,rgba(0,0,0,.15) 1px,transparent 1px,transparent 2px),
  repeating-linear-gradient(90deg,rgba(0,0,0,.10) 0,rgba(0,0,0,.10) 1px,transparent 1px,transparent 2px);
  pointer-events:none;z-index:9999}
.sl::after{content:'';position:fixed;inset:0;background:rgba(255,106,0,.02);animation:fl .1s infinite;pointer-events:none}
@keyframes fl{0%,100%{opacity:.97}50%{opacity:1}}

/* ── CONNECT SCREEN ── */
#sConn{position:fixed;inset:0;background:#000;display:flex;justify-content:center;align-items:center;z-index:100}
.bx{background:linear-gradient(180deg,rgba(15,8,0,.98),rgba(5,2,0,.99));border:2px solid var(--o);
  box-shadow:0 0 30px var(--og),0 0 100px rgba(255,106,0,.2);
  padding:30px 40px 40px;max-width:460px;width:92%;position:relative}
.dh{display:flex;align-items:center;gap:10px;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--od)}
.ds{display:flex;gap:6px}
.ds span{width:10px;height:10px;border-radius:50%;animation:bk 2s infinite}
.ds span:nth-child(1){background:#ff5f56}.ds span:nth-child(2){background:#ffbd2e;animation-delay:.3s}.ds span:nth-child(3){background:#ff6a00;animation-delay:.6s}
@keyframes bk{0%,90%,100%{opacity:1}95%{opacity:.4}}
.dtt{font-size:.62rem;color:var(--od);letter-spacing:2px}
h1{font-size:1.7rem;font-weight:700;text-align:center;text-shadow:0 0 20px var(--og),0 0 40px var(--og);
  letter-spacing:8px;margin-bottom:4px;animation:tf .5s infinite}
@keyframes tf{0%,100%{opacity:1}93%{opacity:.8}96%{opacity:.9}}
.sub{text-align:center;color:var(--td);font-size:.62rem;letter-spacing:4px;margin-bottom:22px}
.sub::before{content:'[ '}.sub::after{content:' ]'}
.fg{margin-bottom:14px}
.fl{font-size:.62rem;color:var(--o);margin-bottom:6px;display:flex;align-items:center;gap:5px}
.fl::before{content:'>';color:var(--ob)}
input.fi,textarea.fi{width:100%;background:rgba(20,10,0,.8);border:1px solid var(--od);
  border-left:3px solid var(--o);color:var(--o);font-family:'Courier New',monospace;
  font-size:.72rem;padding:10px 13px;outline:0;transition:all .2s}
input.fi:focus,textarea.fi:focus{border-color:var(--o);box-shadow:0 0 18px rgba(255,106,0,.3)}
input.fi::placeholder,textarea.fi::placeholder{color:var(--td)}
textarea.fi{resize:vertical;min-height:70px;line-height:1.4}
.pid{background:rgba(30,15,0,.6);border:1px solid var(--o);padding:11px;text-align:center;margin-bottom:14px;display:none}
.pid.show{display:block}
.pidl{font-size:.58rem;color:var(--od)}.pidl::before{content:'>>> USER: '}
.pidv{font-size:1.5rem;font-weight:700;letter-spacing:8px;text-shadow:0 0 15px var(--og);
  margin-top:5px;animation:gp 1.5s ease-in-out infinite}
@keyframes gp{0%,100%{text-shadow:0 0 15px var(--og)}50%{text-shadow:0 0 30px var(--og),0 0 50px rgba(255,106,0,.5)}}
.btn{width:100%;padding:13px;background:0;border:2px solid var(--o);color:var(--o);
  font-family:'Courier New',monospace;font-size:.7rem;font-weight:700;letter-spacing:3px;
  cursor:pointer;overflow:hidden;transition:all .2s;text-transform:uppercase;position:relative}
.btn::before{content:'> ';color:var(--ob)}
.btn::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,106,0,.2),transparent);transition:left .3s}
.btn:hover:not(:disabled)::after{left:100%}
.btn:hover:not(:disabled){background:rgba(255,106,0,.1);box-shadow:0 0 25px var(--og)}
.btn:disabled{opacity:.3;cursor:not-allowed}
.cst{text-align:center;font-size:.6rem;padding:8px;margin-top:10px;color:var(--td)}
.cst.ok{color:var(--o)}.cst.err{color:#f44}.cst.warn{color:#fa0}
.corner{position:absolute;width:14px;height:14px;border-color:var(--o);border-style:solid}
.corner.tl{top:5px;left:5px;border-width:2px 0 0 2px}
.corner.tr{top:5px;right:5px;border-width:2px 2px 0 0}
.corner.bl{bottom:5px;left:5px;border-width:0 0 2px 2px}
.corner.br{bottom:5px;right:5px;border-width:0 2px 2px 0}

/* ── MAIN LAYOUT ── */
#sMain{display:none;position:fixed;inset:0;flex-direction:row}
#sMain.show{display:flex}

/* ── SIDEBAR ── */
#sidebar{
  width:260px;min-width:260px;
  background:linear-gradient(180deg,rgba(12,5,0,.99),rgba(6,2,0,.99));
  border-right:1px solid var(--od);
  display:flex;flex-direction:column;
  overflow:hidden;position:relative;transition:width .25s,min-width .25s;
  z-index:10;
}
#sidebar.collapsed{width:42px;min-width:42px}
#sideToggle{
  position:absolute;right:-12px;top:50%;transform:translateY(-50%);
  width:22px;height:44px;background:rgba(10,4,0,.98);border:1px solid var(--od);
  color:var(--o);cursor:pointer;font-size:.65rem;display:flex;align-items:center;justify-content:center;
  z-index:20;transition:right .25s;
}
#sideToggle:hover{background:rgba(255,106,0,.15);border-color:var(--o)}
#sidebar.collapsed #sideToggle{right:-13px}

.sb-head{padding:14px 12px 10px;border-bottom:1px solid rgba(255,106,0,.15);flex-shrink:0}
.sb-title{font-size:.6rem;color:var(--o);letter-spacing:3px;text-shadow:0 0 8px var(--og);white-space:nowrap}
.sb-user{font-size:.52rem;color:var(--od);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-user span{color:var(--o)}
.onl-badge{display:inline-block;background:rgba(255,106,0,.15);border:1px solid rgba(255,106,0,.3);
  font-size:.5rem;color:var(--ob);padding:2px 7px;letter-spacing:2px;margin-top:6px}

#sidebar.collapsed .sb-head{padding:14px 4px 10px;display:flex;flex-direction:column;align-items:center}
#sidebar.collapsed .sb-title,#sidebar.collapsed .sb-user,#sidebar.collapsed .onl-badge{display:none}
#sidebar.collapsed .sb-icon{display:flex}
.sb-icon{display:none;width:28px;height:28px;border:1px solid var(--od);align-items:center;
  justify-content:center;font-size:.75rem}

/* user list in sidebar */
.sb-section{padding:10px 12px 6px;flex-shrink:0}
.sb-section-title{font-size:.5rem;color:var(--od);letter-spacing:3px;margin-bottom:8px;white-space:nowrap}
#sidebar.collapsed .sb-section{display:none}
.user-entry{display:flex;align-items:center;gap:8px;margin-bottom:6px;cursor:pointer;padding:4px 6px;transition:background .15s}
.user-entry:hover{background:rgba(255,106,0,.07)}
.user-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;box-shadow:0 0 6px currentColor}
.user-name{font-size:.62rem;color:var(--o);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.user-name.you{color:#fa0}
.user-live{font-size:.45rem;color:#0f8;letter-spacing:1px;border:1px solid #0f8;padding:1px 4px;
  animation:livepulse 1s infinite}
@keyframes livepulse{0%,100%{opacity:1}50%{opacity:.4}}
.user-off{font-size:.45rem;color:var(--td);letter-spacing:1px}

/* stats bar */
.sb-stats{margin-top:auto;padding:10px 12px;border-top:1px solid rgba(255,106,0,.1);
  font-size:.52rem;color:var(--od);flex-shrink:0}
#sidebar.collapsed .sb-stats{display:none}
.sb-stats span{color:var(--o)}

/* ── MAIN CONTENT ── */
#mainContent{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}

/* top bar */
.topbar{
  height:38px;background:linear-gradient(90deg,rgba(10,4,0,.98),rgba(6,2,0,.99));
  border-bottom:1px solid rgba(255,106,0,.15);display:flex;align-items:center;
  padding:0 12px;gap:8px;flex-shrink:0
}
.topbar-title{font-size:.62rem;color:var(--o);letter-spacing:4px;text-shadow:0 0 8px var(--og);margin-right:4px}
.topbar-fps{font-size:.52rem;color:var(--od);margin-left:auto;white-space:nowrap}
.topbar-fps span{color:var(--o)}
.topbar-btn{background:0;border:1px solid var(--od);color:var(--od);font-family:'Courier New',monospace;
  font-size:.52rem;padding:4px 10px;cursor:pointer;letter-spacing:1px;transition:all .15s;white-space:nowrap}
.topbar-btn:hover{border-color:var(--o);color:var(--o);background:rgba(255,106,0,.08)}
.topbar-btn.live{border-color:#0f8;color:#0f8;animation:livepulse 1s infinite}
.topbar-btn.danger{border-color:#f44;color:#f44}
.topbar-btn.danger:hover{background:rgba(255,68,68,.08)}

/* ── STREAMS GRID ── */
#streamsArea{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px;
  scrollbar-width:thin;scrollbar-color:var(--od) transparent;
  display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
  gap:16px;align-content:start}
#streamsArea::-webkit-scrollbar{width:4px}
#streamsArea::-webkit-scrollbar-thumb{background:var(--od)}

/* empty state */
.no-streams{grid-column:1/-1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;height:300px;color:var(--td);font-size:.65rem;letter-spacing:3px;
  text-align:center;gap:16px}
.no-streams .big{font-size:1.4rem;opacity:.3}

/* stream card */
.stream-card{
  background:linear-gradient(180deg,rgba(12,5,0,.98),rgba(6,2,0,.99));
  border:1px solid var(--od);position:relative;overflow:hidden;
  transition:border-color .2s,box-shadow .2s;
}
.stream-card.mine{border-color:var(--o);box-shadow:0 0 16px rgba(255,106,0,.2)}
.stream-card.active{border-color:var(--o);box-shadow:0 0 20px rgba(255,106,0,.25)}
.stream-card-head{
  display:flex;align-items:center;gap:8px;padding:7px 10px;
  border-bottom:1px solid rgba(255,106,0,.12);background:rgba(5,2,0,.8)
}
.sc-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;box-shadow:0 0 6px currentColor}
.sc-name{font-size:.62rem;color:var(--o);flex:1;font-weight:700}
.sc-name.you{color:#fa0}
.sc-badge{font-size:.44rem;letter-spacing:1px;padding:2px 6px;border:1px solid}
.sc-badge.live{color:#0f8;border-color:#0f8;animation:livepulse 1s infinite}
.sc-badge.off{color:var(--td);border-color:var(--od)}
.sc-badge.you{color:#fa0;border-color:#fa0}
.sc-fps{font-size:.44rem;color:var(--td)}
.sc-download{font-size:.44rem;color:var(--od);cursor:pointer;padding:4px 8px;margin-left:8px;border:1px solid var(--od);
  transition:all .15s;white-space:nowrap;background:0;border-radius:2px}
.sc-download:hover{color:var(--o);border-color:var(--o);background:rgba(255,106,0,.08)}

/* ascii display — pre sized by direct font-size calculation.
   Font size = cardWidth / cols. No transforms, no scaling tricks.
   The pre fills the card exactly because every char is exactly
   cardWidth/cols pixels wide in a monospace font. */
.ascii-wrap{
  background:#000;
  width:100%;
  overflow:hidden;
  position:relative;
  display:block;
}
.ascii-pre{
  font-family:'Courier New',monospace;
  white-space:pre;
  color:var(--o);
  background:#000;
  display:block;
  padding:0;margin:0;
  border:none;outline:none;
  /* font-size and line-height set by JS per render */
}
.ascii-wrap.dim .ascii-pre{color:var(--od);opacity:.4}

/* own preview card */
.stream-card.mine .ascii-wrap{
  border-top:1px solid rgba(255,106,0,.08);
}

/* cam controls row */
.cam-controls{
  display:flex;align-items:center;gap:8px;padding:7px 10px;
  border-top:1px solid rgba(255,106,0,.12);background:rgba(5,2,0,.6)
}
.cc-btn{background:0;border:1px solid var(--od);color:var(--od);font-family:'Courier New',monospace;
  font-size:.52rem;padding:4px 12px;cursor:pointer;transition:all .15s;letter-spacing:1px;white-space:nowrap}
.cc-btn:hover:not(:disabled){border-color:var(--o);color:var(--o);background:rgba(255,106,0,.08)}
.cc-btn:disabled{opacity:.25;cursor:not-allowed}
.cc-btn.live{border-color:#0f8;color:#0f8}
.cc-btn.live:hover{background:rgba(0,255,136,.06)}
.cc-btn.stop{border-color:#f44;color:#f44}
.cc-btn.stop:hover{background:rgba(255,68,68,.06)}
.cc-select{background:rgba(10,4,0,.9);border:1px solid var(--od);color:var(--od);
  font-family:'Courier New',monospace;font-size:.5rem;padding:4px 6px;outline:0;cursor:pointer}
.cc-select:focus{border-color:var(--o);color:var(--o)}
.cc-select option{background:#080300}

/* resolution badge */
.cc-res{font-size:.44rem;color:var(--td);letter-spacing:1px;white-space:nowrap}

/* notification */
.notif{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:rgba(6,2,0,.97);border:2px solid var(--o);padding:14px 32px;
  font-size:.72rem;letter-spacing:3px;text-shadow:0 0 10px var(--og);
  box-shadow:0 0 40px var(--og);z-index:300;opacity:0;transition:opacity .2s;pointer-events:none}
.notif::before{content:'> ';color:var(--ob)}
.notif.show{opacity:1}

/* ── CHAT PANEL (inside sidebar) ── */
.sb-chat{
  display:flex;flex-direction:column;flex:1;min-height:0;
  border-top:1px solid rgba(255,106,0,.15);
  overflow:hidden;
}
#sidebar.collapsed .sb-chat{display:none}
.sb-chat-title{
  font-size:.5rem;color:var(--od);letter-spacing:3px;
  padding:8px 12px 4px;flex-shrink:0;
}
#chatMessages{
  flex:1;overflow-y:auto;padding:6px 10px;
  font-size:.58rem;line-height:1.5;
  scrollbar-width:thin;scrollbar-color:var(--od) transparent;
  min-height:0;
}
#chatMessages::-webkit-scrollbar{width:3px}
#chatMessages::-webkit-scrollbar-thumb{background:var(--od)}
.chat-msg{margin-bottom:3px;word-break:break-word}
.chat-msg .cm-name{font-weight:700;margin-right:4px}
.chat-msg .cm-name.you{color:#fa0}
.chat-msg .cm-name.other{color:var(--ob)}
.chat-msg .cm-text{color:var(--o)}
.chat-msg.sys{color:var(--od);font-style:italic}
.sb-chat-input{
  display:flex;flex-shrink:0;border-top:1px solid rgba(255,106,0,.12);
}
#chatInput{
  flex:1;background:rgba(8,3,0,.95);border:none;outline:none;
  color:var(--o);font-family:'Courier New',monospace;font-size:.58rem;
  padding:7px 10px;
}
#chatInput::placeholder{color:var(--td)}
#chatSend{
  background:0;border:none;border-left:1px solid rgba(255,106,0,.2);
  color:var(--od);font-family:'Courier New',monospace;font-size:.52rem;
  padding:0 10px;cursor:pointer;transition:color .15s,background .15s;
  white-space:nowrap;
}
#chatSend:hover{color:var(--o);background:rgba(255,106,0,.08)}

/* hidden cam canvas */
#camCanvas{display:none}
</style>
</head>
<body>
<div class="sl"></div>

<!-- ══ CONNECT ══ -->
<div id="sConn">
  <div class="bx">
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
    <div class="dh">
      <div class="ds"><span></span><span></span><span></span></div>
      <div class="dtt">TERMINAL v0.420</div>
    </div>
    <h1>BITMAP OASIS</h1>
    <div class="sub">ASCII VIDEO STREAM</div>
    <div class="fg">
      <div class="fl">Server Address</div>
      <input id="iIP" class="fi" placeholder="Enter server IP">
    </div>
    <div class="fg">
      <div class="fl">Access Token</div>
      <textarea id="iTok" class="fi" placeholder="Paste token from server..." oninput="parseToken()"></textarea>
    </div>
    <div class="pid" id="pidBox">
      <div class="pidl">Player ID</div>
      <div class="pidv" id="pidVal"></div>
    </div>
    <button class="btn" id="btnConn" onclick="doConnect()" disabled>EXECUTE</button>
    <div class="cst" id="cst">Awaiting token input...</div>
  </div>
</div>

<!-- ══ MAIN APP ══ -->
<div id="sMain">
  <!-- SIDEBAR -->
  <div id="sidebar">
    <button id="sideToggle" onclick="toggleSidebar()">◄</button>
    <div class="sb-head">
      <div class="sb-icon">📡</div>
      <div class="sb-title">BITMAP OASIS</div>
      <div class="sb-user">USER: <span id="sbUser"></span></div>
      <div class="onl-badge">ONLINE: <span id="sbOnl">0</span></div>
    </div>
    <div class="sb-section">
      <div class="sb-section-title">STREAMERS</div>
      <div id="sbStreamers"></div>
    </div>

    <!-- CHAT -->
    <div class="sb-chat">
      <div class="sb-chat-title">CHAT</div>
      <div id="chatMessages"></div>
      <div class="sb-chat-input">
        <input id="chatInput" placeholder="Type a message… Enter to send" maxlength="200"
               onkeydown="if(event.key==='Enter')sendChat()">
        <button id="chatSend" onclick="sendChat()">SEND</button>
      </div>
    </div>

    <div class="sb-stats">
      FPS: <span id="gFPS">0</span>
      &nbsp;↑<span id="gSent">0B</span>
      &nbsp;↓<span id="gRecv">0B</span>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div id="mainContent">
    <div class="topbar">
      <div class="topbar-title">ASCII STREAM</div>
      <select class="cc-select" id="resSelect" onchange="setResolution(this.value)">
        <option value="lo">LOW 60×30</option>
        <option value="mid" selected>MID 80×40</option>
        <option value="hi">HIGH 100×50</option>
      </select>
      <select class="cc-select" id="palSelect" onchange="setPalette(this.value)">
        <option value="ascii" selected>ASCII</option>
        <option value="block">BLOCK</option>
        <option value="matrix">MATRIX</option>
      </select>
      <button class="cc-btn" id="camBtn" onclick="toggleCam()">► GO LIVE</button>
      <div class="topbar-fps">TX: <span id="txRate">0</span> fps &nbsp; RX: <span id="rxCount">0</span></div>
    </div>
    <!-- STREAMS GRID -->
    <div id="streamsArea">
      <div class="no-streams" id="noStreams">
        <div class="big">📡</div>
        <div>NO ACTIVE STREAMS</div>
        <div style="font-size:.52rem;color:var(--td)">START YOUR CAMERA BELOW · OTHERS WILL APPEAR HERE</div>
      </div>
    </div>
  </div>
</div>

<!-- hidden elements for cam processing -->
<canvas id="camCanvas"></canvas>
<div class="notif" id="notif"></div>

<script>
// ═══════════════════════════════════════════════
//  WEBRTC BOILERPLATE (identical to TTT game)
// ═══════════════════════════════════════════════
let pc=null,dc=null,turnPc=null,cTmr=null,tTmr=null;
let myUser=null,myColor="#ff6a00",connected=false;
let bS=0,bR=0,fT=performance.now(),fN=0,fV=0;
let players={};
let nTmr=null;

function extICE(sdp){
  const n={},cs=[];
  for(const l of sdp.split("\r\n")){
    if(l.startsWith("a=ice-ufrag:"))n.u=l.slice(12);
    else if(l.startsWith("a=ice-pwd:"))n.p=l.slice(10);
    else if(l.startsWith("a=fingerprint:"))n.f=l.split(" ")[1]?.replace(/:/g,"")||"";
    else if(l.startsWith("a=candidate:")){
      const x=l.split(" ");
      if(x.length>=8&&x[6]==="typ")cs.push({t:x[7],ip:x[4],pt:x[5]});
    }
  }
  const c=cs.find(x=>x.t==="srflx"&&x.ip.includes("."))||cs.find(x=>x.t==="host"&&x.ip.includes("."))||cs[0];
  if(c)n.c=`${c.ip}:${c.pt}`;
  return n;
}
function encSDP(sdp,type,name){
  const a=extICE(sdp);
  return`${type==="offer"?"O":"A"},${name},${a.u},${a.p},${a.f},${a.c||"0.0.0.0:9"}`;
}
function decSDP(tok){
  const t=tok.split(",");if(t.length<6)throw 0;
  const[,name,u,p,f,cs]=t,[ip,pt]=cs.split(":");
  const fc=(f||"").match(/.{1,2}/g)?.join(":")||"";
  return{sdp:`v=0\r\no=- ${Date.now()} 2 IN IP4 ${ip}\r\ns=-\r\nt=0 0\r\na=msid-semantic: WMS\r\nm=application ${pt||9} UDP/DTLS/SCTP webrtc-datachannel\r\nc=IN IP4 ${ip}\r\na=mid:0\r\na=sctp-port:5000\r\na=max-message-size:262144\r\na=setup:actpass\r\na=ice-ufrag:${u}\r\na=ice-pwd:${p}\r\na=fingerprint:sha-256 ${fc}\r\na=candidate:1 1 UDP 2122260223 ${ip} ${pt||9} typ host\r\na=end-of-candidates\r\n`,username:name};
}
function setSt(m,c=""){const e=document.getElementById("cst");e.textContent=m;e.className="cst "+c;}
function popup(m,ms=2500){
  clearTimeout(nTmr);const e=document.getElementById("notif");
  e.textContent=m;e.classList.add("show");
  nTmr=setTimeout(()=>e.classList.remove("show"),ms);
}
function parseToken(){
  const v=document.getElementById("iTok").value.trim();
  const pb=document.getElementById("pidBox"),pv=document.getElementById("pidVal"),bn=document.getElementById("btnConn");
  if(!v||!v.includes(",")){bn.disabled=true;pb.classList.remove("show");setSt("Awaiting token input...");return;}
  try{
    const p=v.split(",");if(p.length>=6){
      myUser=p[1];pv.textContent=myUser;pb.classList.add("show");
      const ip=p[5].split(":")[0],si=document.getElementById("iIP");
      if(!si.value&&ip.match(/^\d+\.\d+\.\d+\.\d+$/))si.value=ip;
      bn.disabled=false;setSt("Ready","ok");
    }
  }catch{bn.disabled=true;setSt("Invalid token","err");}
}
async function doConnect(){
  const sip=document.getElementById("iIP").value.trim(),tok=document.getElementById("iTok").value.trim();
  if(!sip)return setSt("Enter server IP","err");
  if(!tok)return setSt("Enter token","err");
  let sdp;document.getElementById("btnConn").disabled=true;setSt("Connecting…","warn");
  try{const d=decSDP(tok);sdp=d.sdp;myUser=d.username;}catch{return setSt("Invalid token","err");}
  pc=new RTCPeerConnection({iceServers:[{urls:`stun:${sip}:3478`}],iceCandidatePoolSize:0});
  pc.ondatachannel=e=>{dc=e.channel;setupDC();};
  pc.oniceconnectionstatechange=()=>{
    const s=pc.iceConnectionState;
    if((s==="failed"||s==="disconnected")&&connected)location.reload();
  };
  try{await pc.setRemoteDescription({type:"offer",sdp});const a=await pc.createAnswer();await pc.setLocalDescription(a);}
  catch{return setSt("Connection failed","err");}
  setSt("Gathering…");await waitICE();
  const ans=encSDP(pc.localDescription.sdp,"answer",myUser);setSt("Authenticating…");
  turnPc=new RTCPeerConnection({iceServers:[{urls:`turn:${sip}:3478`,username:ans,credential:"x"}],iceTransportPolicy:"relay"});
  turnPc.createDataChannel("_sig");
  try{const o=await turnPc.createOffer();await turnPc.setLocalDescription(o);}catch{}
  cTmr=setTimeout(()=>{if(!connected)setSt("Timeout","err");},30000);
  tTmr=setTimeout(()=>{if(turnPc&&!connected){try{turnPc.close()}catch{}turnPc=null;}},20000);
}
async function waitICE(){
  return new Promise(res=>{
    if(!pc||pc.iceGatheringState==="complete")return res();
    let done=false;const f=()=>{if(!done){done=true;res();}};
    pc.onicecandidate=()=>{if(pc?.iceGatheringState==="complete")f();};
    pc.onicegatheringstatechange=()=>{if(pc?.iceGatheringState==="complete")f();};
    setTimeout(f,5000);
  });
}
function setupDC(){
  dc.onopen=()=>{clearTimeout(cTmr);clearTimeout(tTmr);if(turnPc){try{turnPc.close()}catch{}turnPc=null;}};
  dc.onerror=()=>{if(connected)location.reload();};
  dc.onmessage=e=>{bR+=e.data.length;try{onMsg(JSON.parse(e.data));}catch{}};
  dc.onclose=()=>{if(connected)location.reload();};
}
function push(obj){if(dc?.readyState==="open"){const s=JSON.stringify(obj);bS+=s.length;dc.send(s);}}
function bcast(msg){push({type:"chat",message:msg});}

function onMsg(msg){
  switch(msg.type){
    case"init":
      myColor=msg.yourColor;
      for(const p of msg.players)players[p.username]={color:p.color};
      connected=true;clearTimeout(cTmr);clearTimeout(tTmr);
      document.getElementById("sConn").style.display="none";
      document.getElementById("sMain").classList.add("show");
      document.getElementById("sbUser").textContent=myUser;
      // init our own card
      initMyCard();
      // build cards for existing players
      for(const p of msg.players)ensureCard(p.username,p.color);
      updateSidebar();
      requestAnimationFrame(statsLoop);
      addChatMsg(null, "Connected to BITMAP OASIS", true);
      popup("CONNECTED TO BITMAP OASIS",2000);
      break;
    case"spawn":
      players[msg.username]={color:msg.color};
      ensureCard(msg.username,msg.color);
      updateSidebar();
      addChatMsg(null, msg.username + " joined", true);
      popup(`${msg.username} JOINED`,1500);
      break;
    case"despawn":
      delete players[msg.username];
      removeCard(msg.username);
      updateSidebar();
      addChatMsg(null, msg.username + " left", true);
      break;
    case"chat":
      // Route stream protocol; show everything else as chat
      if(msg.message.startsWith("ascii:")){
        routeStream(msg.username, msg.message);
      } else {
        addChatMsg(msg.username, msg.message, false);
      }
      break;
  }
}

function addChatMsg(name, text, isSystem){
  const box = document.getElementById("chatMessages");
  if(!box) return;
  const d = document.createElement("div");
  if(isSystem){
    d.className = "chat-msg sys";
    d.textContent = "> " + text;
  } else {
    d.className = "chat-msg";
    const isMe = (name === myUser);
    d.innerHTML = `<span class="cm-name ${isMe?"you":"other"}">${esc(name)}:</span>`
                + `<span class="cm-text"> ${esc(text)}</span>`;
  }
  box.appendChild(d);
  // Keep last 80 messages
  while(box.children.length > 80) box.removeChild(box.firstChild);
  box.scrollTop = box.scrollHeight;
}

function sendChat(){
  const inp = document.getElementById("chatInput");
  const txt = inp.value.trim();
  if(!txt || !dc || dc.readyState !== "open") return;
  // Don't allow messages that look like stream protocol
  if(txt.startsWith("ascii:")) return;
  addChatMsg(myUser, txt, false);
  bcast(txt);
  inp.value = "";
}


//
//  Sent as broadcast chat messages:
//
//  ascii:on:<w>:<h>                        — started streaming
//  ascii:off                               — stopped streaming
//  ascii:f:<cols>:<rows>:<seq>:<total>:<idx>:<data> — frame chunk
//
// ═══════════════════════════════════════════════
function routeStream(sender,raw){
  if(!raw.startsWith("ascii:"))return;
  const firstColon=raw.indexOf(":",6);
  const cmd=firstColon===-1?raw.slice(6):raw.slice(6,firstColon);
  const rest=firstColon===-1?"":raw.slice(firstColon+1);

  switch(cmd){
    case"on":{
      const p=rest.split(":");
      const w=parseInt(p[0])||80;
      const h=parseInt(p[1])||40;
      setCardLive(sender,true,w,h);
      break;
    }
    case"off":
      setCardLive(sender,false);
      break;
    case"f":{
      // format: <cols>:<rows>:<seq>:<total>:<idx>:<data>
      // Parse exactly 5 header fields; data (6th) may contain colons
      let seg=rest, parts=[];
      for(let i=0;i<5;i++){
        const ci=seg.indexOf(":");
        if(ci===-1){parts.push(seg);seg="";break;}
        parts.push(seg.slice(0,ci));
        seg=seg.slice(ci+1);
      }
      const cols  = parseInt(parts[0])||80;
      const rows  = parseInt(parts[1])||40;
      const seq   = parseInt(parts[2])||0;
      const total = parseInt(parts[3])||1;
      const idx   = parseInt(parts[4])||0;
      const data  = seg; // everything after the 5th colon
      receiveChunk(sender,cols,rows,seq,total,idx,data);
      break;
    }
  }
}

// ═══════════════════════════════════════════════
//  ASCII ENGINE
// ═══════════════════════════════════════════════

// Character palette — from dense to sparse
// Dense block chars give better fill, sparse give more texture
const PALETTE_BLOCK = "█▓▒░█▓▒░#%@&$!+;:,. ";
const PALETTE_ASCII = "@#S%?*+;:,. ";
const PALETTE_MATRIX= "01010110100011010#%@&$!+;:,. ";

let asciiPalette = PALETTE_ASCII;
let asciiCols = 80;
let asciiRows = 40;
let camStream = null;
let camActive = false;
let txFrameCount = 0;
let txFPS = 0;
let txFpsTimer = 0;
let txInterval = null;
let myCardEl = null;
// remote stream cards: username -> {card,wrap,scaler,pre,w,h,live,...}
const remoteCards = {}; // username -> {card, cv, wrap, w, h, live}

// ═══════════════════════════════════════════════
//  FRAME TRANSPORT
//
//  Server relay limit ≈ 256 bytes/message.
//  Header: "ascii:f:80:40:99:99:99:" = 22 chars max
//  → safe data per chunk: 180 chars
//
//  Protocol: ascii:f:<cols>:<rows>:<seq>:<total>:<idx>:<data>
//    seq   = incrementing frame sequence number (wraps at 999)
//            lets receiver discard stale chunks from old frames
//    total = number of chunks this frame was split into
//    idx   = 0-based chunk index
//    data  = raw palette chars + pipe separators, no encoding
//
//  Chunks are sent with small delays so we don't burst-flood
//  the server and trigger rate limiting.
// ═══════════════════════════════════════════════
const CHUNK_SIZE = 160;   // data bytes per message — safe under 256 total
const CHUNK_DELAY = 12;   // ms between chunks (~80 chunks/s max send rate)

let frameSeq = 0;                // wraps 0-998
const chunkBuf = {};             // sender → {seq, total, cols, rows, chunks[], count}

function sendFrame(ascii, cols, rows){
  frameSeq = (frameSeq + 1) % 999;
  const seq = frameSeq;
  const total = Math.ceil(ascii.length / CHUNK_SIZE) || 1;
  for(let i = 0; i < total; i++){
    const chunk = ascii.slice(i * CHUNK_SIZE, (i + 1) * CHUNK_SIZE);
    // Stagger sends: chunk i goes out after i*CHUNK_DELAY ms
    setTimeout(()=>{
      bcast(`ascii:f:${cols}:${rows}:${seq}:${total}:${i}:${chunk}`);
    }, i * CHUNK_DELAY);
  }
}

function receiveChunk(sender, cols, rows, seq, total, idx, data){
  // Ensure card exists
  if(!remoteCards[sender]){
    const p = players[sender];
    ensureCard(sender, p?.color || "#ff6a00");
  }
  const c = remoteCards[sender];
  if(!c) return;

  const buf = chunkBuf[sender];

  // Start fresh buffer when a new frame sequence number arrives
  if(!buf || buf.seq !== seq){
    chunkBuf[sender] = {
      seq, total, cols, rows,
      chunks: new Array(total).fill(null),
      count: 0
    };
  }
  const b = chunkBuf[sender];

  // Store chunk (ignore duplicates)
  if(b.chunks[idx] === null){
    b.chunks[idx] = data;
    b.count++;
  }

  // All chunks received → reassemble and render
  if(b.count >= b.total){
    const ascii = b.chunks.join("");
    delete chunkBuf[sender];
    c.w = cols; c.h = rows;

    // Mark card live on first frame
    if(!c.live){
      c.live = true;
      const badge = document.getElementById("live-" + sender);
      if(badge){ badge.className = "sc-badge live"; badge.textContent = "LIVE"; }
      c.card.classList.add("active");
      c.wrap.classList.remove("dim");
      updateSidebar();
    }

    renderAscii(c.wrap, c.pre, ascii, cols, rows);

    // fps counter
    c.frameCount = (c.frameCount || 0) + 1;
    const now = performance.now();
    if(now - (c.lastFpsTime || 0) >= 1000){
      c.fps = c.frameCount; c.frameCount = 0; c.lastFpsTime = now;
      const fpsEl = document.getElementById("fps-" + sender);
      if(fpsEl) fpsEl.textContent = c.fps + " fps";
    }
  }
}

// Capture one frame, display locally, send chunked
function captureAndSend(){
  if(!camActive||!camStream)return;
  const video=document.getElementById("myVideo");
  if(!video||video.readyState<2)return;

  const W=asciiCols*4; // canvas capture width
  const H=asciiRows*4; // canvas capture height
  const canvas=document.getElementById("camCanvas");
  if(canvas.width!==W||canvas.height!==H){canvas.width=W;canvas.height=H;}

  const ctx=canvas.getContext("2d",{willReadFrequently:true});
  ctx.clearRect(0,0,W,H);
  // Mirror: translate to right edge, scale x by -1, draw normally
  ctx.save();
  ctx.translate(W,0);
  ctx.scale(-1,1);
  ctx.drawImage(video,0,0,W,H);
  ctx.restore();

  const imageData=ctx.getImageData(0,0,W,H);
  const ascii = frameToAscii(imageData, asciiCols, asciiRows);
  // Show locally — same string that gets sent, so sender sees what receiver sees
  if(myPre) renderAscii(myWrap, myPre, ascii, asciiCols, asciiRows);
  sendFrame(ascii, asciiCols, asciiRows);
  txFrameCount++;
  const now=performance.now();
  if(now-txFpsTimer>=1000){txFPS=txFrameCount;txFrameCount=0;txFpsTimer=now;}
  document.getElementById("txRate").textContent=txFPS;
}

function frameToAscii(imageData, cols, rows){
  const {data,width,height}=imageData;
  const pal=asciiPalette;
  const palLen=pal.length;
  const bw=width/cols;
  const bh=height/rows;
  let lines=[];
  for(let row=0;row<rows;row++){
    let line="";
    for(let col=0;col<cols;col++){
      // sample a block of pixels, average brightness
      let r=0,g=0,b=0,count=0;
      const x0=Math.floor(col*bw);
      const y0=Math.floor(row*bh);
      const x1=Math.min(Math.floor((col+1)*bw),width-1);
      const y1=Math.min(Math.floor((row+1)*bh),height-1);
      for(let py=y0;py<=y1;py++){
        for(let px=x0;px<=x1;px++){
          const idx=(py*width+px)*4;
          r+=data[idx];g+=data[idx+1];b+=data[idx+2];count++;
        }
      }
      if(count>0){r/=count;g/=count;b/=count;}
      // perceived luminance
      const lum=(0.299*r+0.587*g+0.114*b)/255;
      const charIdx=Math.floor(lum*(palLen-1));
      line+=pal[charIdx];
    }
    lines.push(line);
  }
  return lines.join("|");
}


async function startCam(){
  try{
    if(camStream)stopCam();
    const constraints={
      video:{width:{ideal:320},height:{ideal:240},facingMode:"user",frameRate:{ideal:15}},
      audio:false
    };
    camStream=await navigator.mediaDevices.getUserMedia(constraints);
    let vid=document.getElementById("myVideo");
    if(!vid){
      vid=document.createElement("video");
      vid.id="myVideo";vid.style.display="none";
      vid.autoplay=true;vid.playsInline=true;vid.muted=true;
      document.body.appendChild(vid);
    }
    vid.srcObject=camStream;
    // Wait until video is actually playing and has real pixel data
    await new Promise(res=>{
      vid.oncanplay=()=>{vid.play().then(res).catch(res);};
      vid.load();
    });
    // Small delay to ensure first frame is decoded
    await new Promise(res=>setTimeout(res,200));
    camActive=true;
    bcast(`ascii:on:${asciiCols}:${asciiRows}`);
    updateMyCardHeader(true);
    if(txInterval)clearInterval(txInterval);
    txInterval=setInterval(captureAndSend, 400); // 2.5fps — gives chunks time to arrive
    popup("CAMERA LIVE — BROADCASTING",2000);
  }catch(e){
    console.error(e);
    popup("CAM ACCESS DENIED — "+e.message,3000);
  }
}

function stopCam(){
  camActive=false;
  if(txInterval){clearInterval(txInterval);txInterval=null;}
  if(camStream){camStream.getTracks().forEach(t=>t.stop());camStream=null;}
  const vid=document.getElementById("myVideo");
  if(vid){vid.srcObject=null;}
  bcast("ascii:off");
  if(myPre)renderOffline(myWrap,myPre,asciiCols,asciiRows);
  updateMyCardHeader(false);
  txFPS=0;document.getElementById("txRate").textContent="0";
  popup("CAMERA OFF",1500);
}

function setResolution(preset){
  const map={lo:[60,30],mid:[80,40],hi:[100,50]};
  const [c,r]=map[preset]||[80,40];
  asciiCols=c;asciiRows=r;
  if(camActive){
    bcast(`ascii:on:${asciiCols}:${asciiRows}`);
    const canvas=document.getElementById("camCanvas");
    canvas.width=asciiCols*4;canvas.height=asciiRows*4;
  } else {
    if(myPre)renderOffline(myWrap,myPre,c,r);
  }
}

function setPalette(name){
  const map={ascii:PALETTE_ASCII,block:PALETTE_BLOCK,matrix:PALETTE_MATRIX};
  asciiPalette=map[name]||PALETTE_ASCII;
}

// ═══════════════════════════════════════════════
//  ASCII RENDERER
//
//  Font size is calculated as: wrap.clientWidth / cols
//  This makes each character exactly 1/cols of the card width.
//  Line height is set to match so rows fill the card vertically.
//  Works identically for sender and all receivers.
// ═══════════════════════════════════════════════

function makeAsciiDisplay(id){
  const wrap = document.createElement("div");
  wrap.className = "ascii-wrap dim";
  wrap.id = "wrap-" + id;
  const pre = document.createElement("pre");
  pre.className = "ascii-pre";
  pre.id = "pre-" + id;
  wrap.appendChild(pre);
  return {wrap, pre};
}

// Apply correct font-size to pre based on card width and cols
function applyFontSize(wrap, pre, cols, rows){
  // Use clientWidth; if not in DOM yet use a safe fallback
  const w = wrap.clientWidth || wrap.offsetWidth || 400;
  // Courier New character width ≈ 0.6 × font-size (standard monospace ratio)
  // So: charWidth = w / cols  →  fontSize = charWidth / 0.6
  const fontSize = (w / cols) / 0.6;
  const lineHeight = fontSize * 1.2; // a bit tighter than normal
  pre.style.fontSize   = fontSize.toFixed(2) + "px";
  pre.style.lineHeight = lineHeight.toFixed(2) + "px";
}

function renderAscii(wrap, pre, ascii, cols, rows){
  pre.textContent = ascii.split("|").join("\n");
  applyFontSize(wrap, pre, cols, rows);
}

function renderOffline(wrap, pre, cols, rows){
  const sep   = "─".repeat(cols - 2);
  const blank = " ".repeat(cols - 2);
  const mid   = Math.floor(rows / 2);
  const msg1  = "[ NO SIGNAL ]";
  const msg2  = "CAMERA  OFF";
  const p1 = " ".repeat(Math.max(0, Math.floor((cols - 2 - msg1.length) / 2)));
  const p2 = " ".repeat(Math.max(0, Math.floor((cols - 2 - msg2.length) / 2)));
  const lines = [];
  for(let r = 0; r < rows; r++){
    if(r === 0)           lines.push("┌" + sep + "┐");
    else if(r === rows-1) lines.push("└" + sep + "┘");
    else if(r === mid-1)  lines.push("│" + p1 + msg1 + " ".repeat(Math.max(0,cols-2-p1.length-msg1.length)) + "│");
    else if(r === mid+1)  lines.push("│" + p2 + msg2 + " ".repeat(Math.max(0,cols-2-p2.length-msg2.length)) + "│");
    else                  lines.push("│" + blank + "│");
  }
  pre.textContent = lines.join("\n");
  applyFontSize(wrap, pre, cols, rows);
}

function toggleCam(){
  if(camActive)stopCam();else startCam();
}

function updateMyCardHeader(live){
  const badge=document.getElementById("myLiveBadge");
  const btn=document.getElementById("camBtn");
  if(live){
    badge.className="sc-badge live";badge.textContent="LIVE";
    btn.className="cc-btn stop";btn.textContent="■ STOP";
    if(myWrap)myWrap.classList.remove("dim");
  } else {
    badge.className="sc-badge off";badge.textContent="OFFLINE";
    btn.className="cc-btn";btn.textContent="► GO LIVE";
    if(myWrap)myWrap.classList.add("dim");
  }
}

function ensureCard(username,color){
  if(remoteCards[username])return;
  const area=document.getElementById("streamsArea");
  document.getElementById("noStreams").style.display="none";
  const{wrap,pre}=makeAsciiDisplay(username);
  renderOffline(wrap,pre,asciiCols,asciiRows);
  const card=document.createElement("div");
  card.className="stream-card";
  card.id="card-"+username;
  card.innerHTML=`
    <div class="stream-card-head">
      <div class="sc-dot" style="background:${color||"#ff6a00"};color:${color||"#ff6a00"}"></div>
      <div class="sc-name">${esc(username)}</div>
      <div class="sc-badge off" id="live-${username}">OFFLINE</div>
      <div class="sc-fps" id="fps-${username}">— fps</div>
      <button class="sc-download" onclick="downloadStream('${esc(username)}')">⬇ DOWNLOAD</button>
    </div>
  `;
  card.appendChild(wrap);
  area.appendChild(card);
  remoteCards[username]={card,wrap,pre,w:asciiCols,h:asciiRows,live:false,frameCount:0,fps:0,lastFpsTime:performance.now()};
  document.getElementById("rxCount").textContent=Object.keys(remoteCards).length;
}

function removeCard(username){
  const c=remoteCards[username];
  if(c){c.card.remove();delete remoteCards[username];}
  document.getElementById("rxCount").textContent=Object.keys(remoteCards).length;
  checkEmpty();
}

function checkEmpty(){
  if(!myCardEl&&Object.keys(remoteCards).length===0)
    document.getElementById("noStreams").style.display="flex";
}

function setCardLive(username,live,w,h){
  const c=remoteCards[username];
  if(!c)return;
  c.live=live;
  if(w)c.w=w;
  if(h)c.h=h;
  const badge=document.getElementById("live-"+username);
  if(live){
    badge.className="sc-badge live";badge.textContent="LIVE";
    c.card.classList.add("active");
    c.wrap.classList.remove("dim");
  } else {
    badge.className="sc-badge off";badge.textContent="OFFLINE";
    c.card.classList.remove("active");
    c.wrap.classList.add("dim");
    renderOffline(c.wrap,c.pre,c.w||asciiCols,c.h||asciiRows);
  }
  updateSidebar();
}


// ═══════════════════════════════════════════════
//  SIDEBAR
// ═══════════════════════════════════════════════
function updateSidebar(){
  const all=[{name:myUser,color:myColor,you:true,live:camActive}];
  for(const[n,p] of Object.entries(players)){
    const rc=remoteCards[n];
    all.push({name:n,color:p.color,you:false,live:rc?.live||false});
  }
  document.getElementById("sbOnl").textContent=all.length;

  const streamerEl=document.getElementById("sbStreamers");
  streamerEl.innerHTML=all.map(u=>`
    <div class="user-entry" onclick="scrollToCard('${esc(u.name)}')">
      <div class="user-dot" style="background:${u.color};color:${u.color}"></div>
      <div class="user-name${u.you?" you":""}">${esc(u.name)}</div>
      ${u.live?'<div class="user-live">LIVE</div>':'<div class="user-off">OFF</div>'}
    </div>
  `).join("");
}

function scrollToCard(username){
  const card=document.getElementById("card-"+username);
  if(card)card.scrollIntoView({behavior:"smooth",block:"nearest"});
}

let sidebarCollapsed=false;
function toggleSidebar(){
  sidebarCollapsed=!sidebarCollapsed;
  const sb=document.getElementById("sidebar");
  const btn=document.getElementById("sideToggle");
  sb.classList.toggle("collapsed",sidebarCollapsed);
  btn.textContent=sidebarCollapsed?"►":"◄";
}

// ═══════════════════════════════════════════════
//  STATS LOOP
// ═══════════════════════════════════════════════
function statsLoop(){
  fN++;const now=performance.now();
  if(now-fT>=1000){fV=fN;fN=0;fT=now;}
  const fmt=b=>b<1024?b+"B":b<1048576?(b/1024).toFixed(1)+"KB":(b/1048576).toFixed(2)+"MB";
  document.getElementById("gFPS").textContent=fV;
  document.getElementById("gSent").textContent=fmt(bS);
  document.getElementById("gRecv").textContent=fmt(bR);
  // update own tx fps
  if(camActive){
    const fpsEl=document.getElementById("myFpsLabel");
    if(fpsEl)fpsEl.textContent=txFPS+" fps";
  }
  requestAnimationFrame(statsLoop);
}

// ═══════════════════════════════════════════════
//  DOWNLOAD FUNCTIONS
// ═══════════════════════════════════════════════
function downloadStream(username){
  // Get the card and display
  let card, pre, wrap, cols, rows;
  if(username === myUser){
    if(!myPre) return popup("No stream to download", 2000);
    pre = myPre;
    wrap = myWrap;
    cols = asciiCols;
    rows = asciiRows;
  } else {
    const rc = remoteCards[username];
    if(!rc || !rc.pre) return popup("Stream not found", 2000);
    pre = rc.pre;
    wrap = rc.wrap;
    cols = rc.w;
    rows = rc.h;
  }
  
  // Get ASCII text from pre element
  const asciiText = pre.textContent;
  
  // Download as TXT
  const timestamp = new Date().toISOString().replace(/[:.]/g, "-").slice(0, -5);
  const filename = `ascii_${username}_${timestamp}.txt`;
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([asciiText], {type: "text/plain"}));
  a.download = filename;
  a.click();
  
  // Download as PNG screenshot
  renderAsciiToImage(wrap, pre, cols, rows, username, timestamp);
  
  popup(`Downloading ${username}'s stream`, 2000);
}

function renderAsciiToImage(wrap, pre, cols, rows, username, timestamp){
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");
  
  // Font metrics
  const fontSize = 10;
  const lineHeight = 12;
  const charWidth = 6;
  const padding = 10;
  
  canvas.width = cols * charWidth + padding * 2;
  canvas.height = rows * lineHeight + padding * 2;
  
  // Fill background
  ctx.fillStyle = "#000";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  // Set text style
  ctx.font = `${fontSize}px 'Courier New', monospace`;
  ctx.fillStyle = "#ff6a00";
  ctx.textBaseline = "top";
  
  // Draw ASCII text line by line
  const lines = pre.textContent.split("\n");
  for(let i = 0; i < lines.length; i++){
    ctx.fillText(lines[i], padding, padding + i * lineHeight);
  }
  
  // Download image
  const filename = `ascii_${username}_${timestamp}.png`;
  canvas.toBlob(blob => {
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
  });
}

// ═══════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════
function esc(s){if(!s)return"";const d=document.createElement("div");d.textContent=s;return d.innerHTML;}
