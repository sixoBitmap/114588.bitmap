<!doctype html>
<html lang="el">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>bitmap profile · tabs</title>
<style>
  :root{ --ink:#0b0d11;--surface:#14171d;--surface2:#1b1f27;--line:#242a34;
    --text:#e7e5df;--mute:#767c87;--dim:#4b515c;--aqua:#35d3c2;--aqua-dim:#1c6f68;--coral:#ff7a5c;
    --sheet:#eceae4;--sheet-ink:#191c22;--sheet-mute:#6b7079;--sheet-line:#d6d3ca;
    --safe:env(safe-area-inset-bottom,0px); }
  *{ box-sizing:border-box;-webkit-tap-highlight-color:transparent; }
  html,body{ margin:0;height:100%;background:#000;overflow:hidden;
    font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;color:var(--text);-webkit-font-smoothing:antialiased; }
  .sans{ font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; }
  button{ font:inherit;color:inherit;background:none;border:none;cursor:pointer; }
  #phone{ position:relative;width:100%;max-width:440px;height:100%;margin:0 auto;background:var(--ink);overflow:hidden; }
  @media (min-width:520px){ body{display:flex;align-items:center;justify-content:center;background:radial-gradient(120% 80% at 50% 0%,#14171d,#050608 70%);}
    #phone{height:min(940px,96vh);border-radius:26px;box-shadow:0 30px 90px rgba(0,0,0,.6),0 0 0 1px var(--line);} }

  /* ── πραγματικό on-chain content (img / iframe / video / text) ── */
  .fillmedia{ width:100%;height:100%;display:block;border:0;object-fit:cover;background:var(--ink); }
  iframe.fillmedia{ pointer-events:none;overflow:hidden; }
  img.pix{ image-rendering:pixelated; }
  .textcard{ display:flex;align-items:center;justify-content:center;text-align:center;
    padding:8%;color:var(--text);background:var(--surface);font-size:9px;line-height:1.55;
    word-break:break-word;white-space:pre-wrap;overflow:hidden; }
  .textcard.big{ font-size:clamp(15px,4.6vw,22px);padding:14%;
    background:radial-gradient(120% 100% at 50% 32%,#1b1f27,#0b0d11); }
  .textcard.ph{ background:var(--surface2);color:var(--dim);animation:phpulse 1.2s ease-in-out infinite; }
  @keyframes phpulse{ 0%,100%{opacity:.55;} 50%{opacity:1;} }
  @media (prefers-reduced-motion:reduce){ .textcard.ph{ animation:none; } }
  .thumb{ position:absolute;left:0;top:0;right:0;bottom:0;overflow:hidden; }

  /* ── start ── */
  #start{ position:absolute;inset:0;z-index:60;background:var(--ink);display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:15px;padding:32px;text-align:center;transition:opacity .35s; }
  #start.gone{ opacity:0;pointer-events:none; }
  #start .mark{ font-size:12px;letter-spacing:.34em;color:var(--aqua);text-transform:uppercase; }
  #start h1{ margin:0;font-size:27px;font-weight:600; } #start h1 b{ color:var(--aqua); }
  #start p{ margin:0;font-size:12.5px;color:var(--mute);line-height:1.7;max-width:300px; }
  #start .field{ display:flex;gap:8px;width:100%;max-width:320px; }
  #start input{ flex:1;background:var(--surface);border:1px solid var(--line);color:var(--text);
    border-radius:10px;padding:13px 14px;font:inherit;font-size:14px;outline:none;text-align:center;min-width:0; }
  #start input:focus{ border-color:var(--aqua-dim); }
  #start .go{ background:var(--aqua);color:#04211e;font-weight:600;border-radius:10px;padding:0 18px;font-size:14px; }
  #start .go:active{ transform:scale(.97); } #start .go:disabled{ opacity:.5; }
  #start .examples{ font-size:11px;color:var(--dim); } #start .examples span{ color:var(--mute);cursor:pointer;text-decoration:underline;text-underline-offset:2px; }
  #start .err{ font-size:11.5px;color:var(--coral);min-height:15px;max-width:300px; }
  #start .err.busy{ color:var(--mute); }  /* πρόοδος ≠ σφάλμα */

  /* ── slim top identity bar ── */
  #topbar{ position:absolute;top:0;left:0;right:0;z-index:20;height:52px;display:flex;align-items:center;gap:10px;
    padding:0 10px;background:rgba(11,13,17,.82);backdrop-filter:blur(10px);border-bottom:1px solid var(--line); }
  .iconbtn{ width:36px;height:36px;border-radius:10px;background:var(--surface);display:flex;align-items:center;
    justify-content:center;font-size:17px;border:1px solid var(--line);flex:0 0 auto; }
  .iconbtn:active{ background:var(--surface2); }
  #tbName{ min-width:0;flex:1; } #tbName .n{ font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;
    text-overflow:ellipsis;display:flex;gap:7px;align-items:center; }
  #tbName .n>span:first-child{ overflow:hidden;text-overflow:ellipsis; }
  #tbName .n .type{ font-size:9px;font-weight:600;color:var(--aqua);border:1px solid var(--aqua-dim);
    border-radius:4px;padding:1px 5px;text-transform:uppercase;flex:0 0 auto; }
  #tbName .s{ font-size:10.5px;color:var(--mute);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px; }
  #tbVer{ flex:0 0 auto;font-size:10.5px;background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:6px 10px; }
  #tbVer:active{ border-color:var(--aqua-dim); }

  /* ── panes ── */
  .pane{ position:absolute;left:0;right:0;top:52px;bottom:calc(60px + var(--safe));display:none; }
  .pane.on{ display:block; }
  #paneContent{ overflow:hidden; }
  .bigmedia{ position:absolute;inset:0; }
  .bigmedia::after{ content:"";position:absolute;inset:0;pointer-events:none;
    background:linear-gradient(180deg,rgba(11,13,17,.3),rgba(11,13,17,0) 30%,rgba(11,13,17,0) 55%,var(--ink) 100%); }
  .bigcap{ position:absolute;left:18px;right:18px;bottom:18px;z-index:2; }
  .bigcap .name{ font-size:26px;font-weight:600;display:flex;gap:9px;align-items:center;min-width:0; }
  .bigcap .name>span:first-child{ overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }
  .bigcap .name .type{ font-size:10px;font-weight:600;color:var(--aqua);border:1px solid var(--aqua-dim);border-radius:5px;padding:2px 6px;text-transform:uppercase;flex:0 0 auto; }
  .bigcap .meta{ font-size:12px;color:var(--mute);margin-top:7px;display:flex;flex-wrap:wrap;gap:4px 12px; }
  .bigcap .meta .k{ color:var(--dim); }
  .bigcap .statline{ display:flex;gap:16px;margin-top:12px; }
  .bigcap .statline .s{ padding:0;text-align:left; }
  .bigcap .statline .s:active{ opacity:.65; }
  .bigcap .statline .s b{ font-size:16px; } .bigcap .statline .s span{ font-size:10px;color:var(--mute);margin-left:5px;text-transform:uppercase;letter-spacing:.06em; }
  .bigcap .statline .s .plus{ color:var(--aqua); }
  /* tags — οι parents του content, όπως στην πλήρη έκδοση */
  .bigcap .tags{ display:flex;gap:7px;overflow-x:auto;margin-top:12px;scrollbar-width:none; }
  .bigcap .tags::-webkit-scrollbar{ display:none; }
  .tag{ flex:0 0 auto;font-size:11.5px;color:var(--text);background:rgba(11,13,17,.66);
    border:1px solid var(--line);border-radius:999px;padding:7px 12px;display:flex;
    align-items:center;gap:6px;max-width:220px; }
  .tag span{ overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }
  .tag:active{ border-color:var(--aqua-dim); }
  .tag .at{ color:var(--aqua); }
  .tag.none{ color:var(--dim);border-style:dashed; }

  #panePosts{ overflow-y:auto; } #panePosts::-webkit-scrollbar{display:none;}
  .grid{ padding:12px;display:grid;grid-template-columns:repeat(3,1fr);gap:6px;align-content:start; }
  /* τετράγωνα tiles: height:0 + padding-top:100% — ΟΡΙΣΜΕΝΟ ύψος, μετράει σωστά
     στο grid row sizing (το aspect-ratio άφηνε τα κελιά να επικαλύπτονται) */
  .cell{ position:relative;height:0;padding-top:100%;border-radius:9px;overflow:hidden;background:#10131a; }
  .cell .textcard{ color:#b9bec8; }
  .cell:active{ opacity:.85; }
  .cell .kids{ position:absolute;left:6px;bottom:6px;font-size:10px;color:#fff;background:rgba(10,12,16,.55);border-radius:6px;padding:2px 6px;z-index:2; }
  .cell .idxchip{ position:absolute;right:5px;top:5px;font-size:10px;color:#fff;background:rgba(20,10,6,.72);border-radius:6px;padding:2px 6px;font-weight:600;z-index:2; }
  .cell.batch::after{ content:"";position:absolute;left:0;top:0;right:0;bottom:0;
    border:1.5px solid var(--coral);border-radius:9px;pointer-events:none;z-index:3; }
  .cell.batch .bg{ position:absolute;right:5px;top:5px;font-size:10px;color:#20100a;background:var(--coral);border-radius:6px;padding:2px 6px;font-weight:600;z-index:5; }
  .grid .empty{ grid-column:1/-1;text-align:center;color:var(--mute);font-size:12.5px;padding:44px 10px; }
  #postsHdr{ display:none;align-items:center;gap:10px;padding:10px 12px 0; }
  #postsHdr .bch{ font-size:12px;color:var(--aqua);flex:0 0 auto; }
  #postsHdr .bt{ font-size:12px;color:var(--mute);white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }

  #paneAbout{ overflow-y:auto;padding:16px 16px calc(20px + var(--safe)); } #paneAbout::-webkit-scrollbar{display:none;}
  .sec{ margin-bottom:22px; } .sec h3{ font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--mute);margin:0 0 10px; }
  .kv{ display:flex;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid var(--line);font-size:12.5px; }
  .kv:last-child{ border-bottom:none; } .kv .k{ color:var(--mute);flex:0 0 auto; } .kv .v{ font-weight:600;max-width:62%;text-align:right;word-break:break-all; }
  .lin{ display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid var(--line);cursor:pointer; }
  .lin:last-child{ border-bottom:none; }
  .lin .av{ width:34px;height:34px;border-radius:8px;overflow:hidden;background:#10131a;flex:0 0 auto;position:relative; }
  .lin .av .textcard{ font-size:4px;padding:2px; }
  .lin .n{ flex:1;min-width:0; }
  .lin .n .t{ font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }
  .lin .n .s{ font-size:11px;color:var(--mute);overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }
  .lin .lvl{ font-size:10px;color:var(--dim);flex:0 0 auto; }
  .verrow{ display:flex;gap:8px;flex-wrap:wrap; }
  .verchip2{ font-size:11.5px;border:1px solid var(--line);border-radius:999px;padding:7px 12px;max-width:100%;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }
  .verchip2.on{ border-color:var(--aqua);color:var(--aqua); }
  .dimnote{ color:var(--dim);font-size:12.5px; }

  /* ── bottom tab bar ── */
  #tabbar{ position:absolute;left:0;right:0;bottom:0;z-index:20;height:calc(60px + var(--safe));
    padding-bottom:var(--safe);display:grid;grid-template-columns:repeat(3,1fr);
    background:rgba(11,13,17,.92);backdrop-filter:blur(12px);border-top:1px solid var(--line); }
  .tab{ display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--mute); }
  .tab .ic{ font-size:19px;line-height:1; } .tab .lb{ font-size:10px;letter-spacing:.04em; }
  .tab.on{ color:var(--aqua); } .tab .badge{ font-size:9px;color:var(--ink);background:var(--aqua);border-radius:999px;padding:0 5px;position:relative;top:-1px; }

  .spin{ display:inline-block;width:13px;height:13px;border:2px solid currentColor;border-right-color:transparent;border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px; }
  @keyframes sp{ to{transform:rotate(360deg);} }

  /* ── post viewer ── */
  #pv{ position:absolute;inset:0;z-index:40;background:var(--ink);display:none;flex-direction:column;touch-action:none; }
  #pv.on{ display:flex; }
  #pv .pvmedia{ position:absolute;inset:0; }
  #pv .pvmedia::after{ content:"";position:absolute;inset:0;pointer-events:none;
    background:linear-gradient(180deg,rgba(11,13,17,.55),rgba(11,13,17,0) 26%,rgba(11,13,17,0) 46%,var(--ink) 100%); }
  #pv .pvtop{ position:relative;z-index:3;display:flex;justify-content:space-between;padding:14px; }
  #pv .pvpos{ font-size:11px;color:var(--text);background:rgba(10,12,16,.5);backdrop-filter:blur(8px);
    border:1px solid rgba(255,255,255,.06);border-radius:999px;padding:7px 11px; }
  #pv .pvfoot{ position:relative;z-index:3;margin-top:auto;padding:0 18px 22px; }
  #pv .pvname{ font-size:20px;font-weight:600;display:flex;gap:9px;align-items:center;min-width:0; }
  #pv .pvname>span:first-child{ overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }
  #pv .pvname .type{ font-size:10px;font-weight:600;color:var(--aqua);border:1px solid var(--aqua-dim);border-radius:5px;padding:2px 6px;text-transform:uppercase;flex:0 0 auto; }
  #pv .pvmeta{ font-size:11.5px;color:var(--mute);margin-top:6px; }
  #pv .pvhint{ margin-top:13px;display:flex;gap:6px; }
  #pv .pvhint span{ font-size:10.5px;color:var(--mute);background:rgba(11,13,17,.6);border:1px solid var(--line);border-radius:999px;padding:5px 10px; }
  #pv .pvhint b{ color:var(--aqua);font-weight:600; }
  #pv .enterbtn{ margin-top:13px;display:inline-flex;align-items:center;gap:8px;background:var(--aqua);color:#04211e;
    font-weight:600;font-size:13px;padding:11px 16px;border-radius:11px; }
  #pv .enterbtn:active{ transform:scale(.98); }

  /* slide-up panel: followers / following — φωτεινό «φύλλο» για αντίθεση */
  .scrim{ position:absolute;inset:0;z-index:52;background:rgba(4,5,7,.5);opacity:0;
    pointer-events:none;transition:opacity .3s; }
  .scrim.on{ opacity:1;pointer-events:auto; }
  #panel{ position:absolute;left:0;right:0;bottom:0;z-index:55;max-height:82%;
    background:var(--sheet);color:var(--sheet-ink);border-radius:18px 18px 0 0;
    transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);
    display:flex;flex-direction:column;box-shadow:0 -12px 40px rgba(0,0,0,.5); }
  #panel.on{ transform:translateY(0); }
  #panel .phead{ padding:14px 16px 8px;display:flex;align-items:center;justify-content:space-between;flex:0 0 auto; }
  #panel .phead .pt{ font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.03em; }
  #panel .pclose{ width:34px;height:34px;border-radius:10px;background:var(--sheet-line);
    color:var(--sheet-ink);display:flex;align-items:center;justify-content:center;font-size:16px; }
  #panel .pbody{ overflow-y:auto;padding:4px 16px calc(20px + var(--safe)); }
  #panel .row{ display:flex;align-items:center;gap:11px;padding:10px 0;
    border-bottom:1px solid var(--sheet-line);cursor:pointer; }
  #panel .row:last-child{ border-bottom:none; }
  #panel .row .av{ width:38px;height:38px;border-radius:9px;overflow:hidden;flex:0 0 auto;
    background:#10131a;position:relative; }
  #panel .row .av .textcard{ font-size:4.5px;padding:2px; }
  #panel .row .info{ min-width:0;flex:1; }
  #panel .row .info .n{ font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }
  #panel .row .info .s{ font-size:11px;color:var(--sheet-mute);overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }
  #panel .row .depth{ font-size:10px;color:var(--sheet-mute);flex:0 0 auto; }
  #panel .loadall{ width:100%;margin-top:8px;padding:12px;border-radius:11px;
    background:var(--sheet-ink);color:var(--sheet);font-size:12.5px;font-weight:600;letter-spacing:.02em; }
  #panel .loadall:disabled{ opacity:.5; }
  #panel .counting{ font-size:12px;color:var(--sheet-mute);text-align:center;padding:14px; }
  #panel .counting b{ color:var(--sheet-ink); }

  #loader{ position:absolute;top:60px;left:50%;transform:translateX(-50%);z-index:30;font-size:11px;color:var(--aqua);
    opacity:0;transition:opacity .2s;background:rgba(11,13,17,.85);padding:6px 12px;border-radius:999px;pointer-events:none; }
  #loader.on{ opacity:1; }
  #toast{ position:absolute;bottom:calc(72px + var(--safe));left:50%;transform:translateX(-50%);z-index:45;
    font-size:11.5px;color:var(--coral);opacity:0;transition:opacity .25s;background:rgba(11,13,17,.92);
    border:1px solid var(--line);padding:8px 14px;border-radius:999px;pointer-events:none;max-width:86%;text-align:center; }
  #toast.on{ opacity:1; }
</style>
</head>
<body>
<div id="phone">
  <div id="start">
    <div class="mark">on-chain profiles</div>
    <h1 class="sans">bitmap <b>profile</b></h1>
    <p class="sans">Γράψε έναν αριθμό bitmap. Τρεις καρτέλες: Content · Posts · About — πατάς και αλλάζει. Ζωντανά δεδομένα από το ordinals.com.</p>
    <div class="field"><input id="bm" inputmode="numeric" autocomplete="off" spellcheck="false" placeholder="αριθμός bitmap · π.χ. 800000" /><button class="go" id="enter">→</button></div>
    <div class="err" id="startErr"></div>
    <div class="examples sans">δοκιμή: <span data-ex="800000">800000</span> · <span data-ex="0">0</span></div>
  </div>

  <div id="topbar">
    <button class="iconbtn" id="back">‹</button>
    <div id="tbName"><div class="n" id="tbN"></div><div class="s" id="tbS"></div></div>
    <button id="tbVer" title="εκδοχές (reinscriptions)">v1</button>
  </div>

  <div class="pane on" id="paneContent">
    <div class="bigmedia" id="bigmedia"></div>
    <div class="bigcap">
      <div class="name" id="cName"></div>
      <div class="meta" id="cMeta"></div>
      <div class="statline" id="cStats"></div>
      <div class="tags" id="cTags"></div>
    </div>
  </div>

  <div class="pane" id="panePosts"><div id="postsHdr"></div><div class="grid" id="grid"></div></div>

  <div class="pane" id="paneAbout">
    <div class="sec"><h3>metadata</h3><div id="aMeta"></div></div>
    <div class="sec" id="aVersSec" style="display:none"><h3>εκδοχές (reinscriptions)</h3><div class="verrow" id="aVers"></div></div>
    <div class="sec"><h3>following · πρόγονοι ως τη ρίζα</h3><div id="aAnc"></div></div>
  </div>

  <div id="tabbar">
    <button class="tab on" data-tab="Content"><span class="ic">◫</span><span class="lb">content</span></button>
    <button class="tab" data-tab="Posts"><span class="ic">▦</span><span class="lb" id="tabPostsLb">posts</span></button>
    <button class="tab" data-tab="About"><span class="ic">≡</span><span class="lb">about</span></button>
  </div>

  <div id="pv">
    <div class="pvmedia" id="pvMedia"></div>
    <div class="pvtop"><button class="iconbtn" id="pvBack">‹</button><div class="pvpos" id="pvPos"></div></div>
    <div class="pvfoot">
      <div class="pvname" id="pvName"></div>
      <div class="pvmeta" id="pvMeta"></div>
      <div class="pvhint"><span>σύρε <b>↑↓</b> · επόμενο / προηγούμενο</span></div>
      <button class="enterbtn" id="pvEnter">άνοιξέ το ως προφίλ →</button>
    </div>
  </div>
  <div class="scrim" id="scrim"></div>
  <div id="panel">
    <div class="phead"><span class="pt" id="panelTitle"></span><button class="pclose" id="panelClose">✕</button></div>
    <div class="pbody" id="panelBody"></div>
  </div>

  <div id="loader"><span class="spin"></span> φόρτωση</div>
  <div id="toast"></div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════════════
   BITMAP PROFILE · TABS · LIVE — μόνο αριθμοί bitmap, πραγματικά δεδομένα
   από τα recursive endpoints του ordinals.com:
     είσοδος: αριθμός bitmap → on-chain bitmap index (9 inscribed σελίδες,
       καλύπτει 0–~845.000) → sat → /r/sat/<sat>/at/0 → inscription id
     content → /content/<id> · info → /r/inscription/<id>
     posts → /r/children/<id>/<page> (ΟΛΕΣ οι σελίδες, αυτόματα)
     πρόγονοι → /r/parents/<id>/<page> · εκδοχές → /r/sat/<sat>/<page>
   ═══════════════════════════════════════════════════════════════════════ */

/* ---------- utils ---------- */
const $=s=>document.querySelector(s), $$=s=>document.querySelectorAll(s);
const esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const shortId=id=>id.slice(0,4)+'…'+id.slice(-5);
const txidOf=id=>id.replace(/i\d+$/,'');
const idxOf=id=>{ const m=id.match(/i(\d+)$/); return m?parseInt(m[1],10):0; };
const fmtBytes=b=>b>=1048576?(b/1048576).toFixed(1)+' MB':b>=1024?(b/1024).toFixed(1)+' KB':b+' B';
const dateFmt=ts=>{ try{ return new Date(ts*1000).toISOString().replace('T',' ').slice(0,16)+' UTC'; }catch{ return '—'; } };
const el=(tag,cls)=>{ const n=document.createElement(tag); if(cls)n.className=cls; return n; };

/* ---------- ordinals.com data layer ---------- */
const API='https://ordinals.com';
function limiter(max){ let act=0; const q=[];
  const next=()=>{ if(act>=max||!q.length) return; act++; const {fn,res,rej}=q.shift();
    fn().then(res,rej).finally(()=>{ act--; next(); }); };
  return fn=>new Promise((res,rej)=>{ q.push({fn,res,rej}); next(); }); }
const lim=limiter(6);
const cache={ json:new Map(), text:new Map(), count:new Map(), name:new Map(), etype:new Map() };
function cachedJSON(path){
  if(cache.json.has(path)) return cache.json.get(path);
  const p=lim(async()=>{ const r=await fetch(API+path);
    if(!r.ok) throw new Error('HTTP '+r.status+' '+path); return r.json(); });
  cache.json.set(path,p); p.catch(()=>cache.json.delete(path));
  return p;
}
const ord={
  contentURL:id=>API+'/content/'+id,
  previewURL:id=>API+'/preview/'+id,
  inscription(id){ return cachedJSON('/r/inscription/'+id); },
  async children(id,page=0){ const r=await cachedJSON(`/r/children/${id}/${page}`); return {ids:r.ids||[],more:!!r.more}; },
  async parents(id,page=0){ const r=await cachedJSON(`/r/parents/${id}/${page}`); return {ids:r.ids||[],more:!!r.more}; },
  async sat(s,page=0){ const r=await cachedJSON(`/r/sat/${s}/${page}`); return {ids:r.ids||[],more:!!r.more}; },
  satAt(s,idx=0){ return cachedJSON(`/r/sat/${s}/at/${idx}`); },
  async childCount(id){
    if(cache.count.has(id)) return cache.count.get(id);
    const r=await this.children(id,0);
    const v={n:r.ids.length,more:r.more}; cache.count.set(id,v); return v;
  },
  async text(id,maxLen=2000){
    const k=id+'/'+maxLen;
    if(cache.text.has(k)) return cache.text.get(k);
    const p=lim(async()=>{ const r=await fetch(this.contentURL(id));
      if(!r.ok) throw new Error('HTTP '+r.status); return (await r.text()).slice(0,maxLen); });
    cache.text.set(k,p); p.catch(()=>cache.text.delete(k));
    return p;
  },
};

/* ---------- on-chain bitmap index (bitmap number → inscription id) ----------
   ΑΥΤΟΥΣΙΟΣ ο sat index: 9 on-chain σελίδες (bitmaps 0–899.999, γεμάτες έως
   ~845.844), delta-encoded sats· id = /r/sat/<sat>/at/0. */
const bitmapIndexPages=Array(9).fill(null);
const BITMAP_INDEX_URLS=[
  '/content/01bba6c58af39d7f199aa2bceeaaba1ba91b23d2663bc4ef079a4b5e442dbf74i0',
  '/content/bb01dfa977a5cd0ee6e900f1d1f896b5ec4b1e3c7b18f09c952f25af6591809fi0',
  '/content/bb02e94f3062facf6aa2e47eeed348d017fd31c97614170dddb58fc59da304efi0',
  '/content/bb037ec98e6700e8415f95d1f5ca1fe1ba23a3f0c5cb7284d877e9ac418d0d32i0',
  '/content/bb9438f4345f223c6f4f92adf6db12a82c45d1724019ecd7b6af4fcc3f5786cei0',
  '/content/bb0542d4606a9e7eb4f31051e91f7696040db06ca1383dff98505618c34d7df7i0',
  '/content/bb06a4dffba42b6b513ddee452b40a67688562be4a1345127e4d57269e6b2ab6i0',
  '/content/bb076934c1c22007b315dd1dc0f8c4a2f9d52f348320cfbadc7c0bd99eaa5e18i0',
  '/content/bb084ed0d70c336861e794c5a2d41a19df8b5531b51ffe71a868695c20cafed2i0',
];
async function fillIndexPage(page){
  let data=await lim(()=>fetch(API+BITMAP_INDEX_URLS[page]).then(r=>r.text()));
  if(page===2||page===3){
    data='['+data+']'; data=JSON.parse(data);
    // flat array: πρώτο μισό sat deltas, δεύτερο μισό positions (200k στοιχεία —
    // τα σκληρά όρια 99999/199999 έκοβαν το τελευταίο ζεύγος)
    const half=data.length/2;
    data=[data.slice(0,half),data.slice(half)];
  } else {
    try{ data=JSON.parse(data.replaceAll('\n  ','')); }catch(e){}
    try{ data=JSON.parse(data.replaceAll('  ','')); }catch(e){}
  }
  const fullSats=[];
  data[0].forEach((sat,i)=>{ fullSats.push(i===0?parseInt(sat):parseInt(fullSats[i-1])+parseInt(sat)); });
  const filled=Array(100000).fill(0);
  data[1].forEach((index,i)=>{ filled[index]=fullSats[i]; });
  bitmapIndexPages[page]=filled;
}
const indexPageLoads=Array(9).fill(null);   // dedupe ταυτόχρονων φορτώσεων σελίδας
async function getBitmapSat(n){
  const page=Math.floor(n/100000);
  if(page>=BITMAP_INDEX_URLS.length) throw new Error('ο on-chain index καλύπτει bitmaps 0 – 899.999');
  if(!bitmapIndexPages[page]){
    if(!indexPageLoads[page])
      indexPageLoads[page]=fillIndexPage(page).catch(e=>{ indexPageLoads[page]=null; throw e; });
    await indexPageLoads[page];
  }
  return bitmapIndexPages[page][n%100000];
}
async function getBitmapInscriptionId(n){
  const sat=await getBitmapSat(n);
  if(!sat) throw new Error('το bitmap '+n+' δεν βρέθηκε στον on-chain index (φτάνει έως ~845.000)');
  const res=await ord.satAt(sat,0);
  if(!res||!res.id) throw new Error('δεν βρέθηκε inscription στο sat '+sat);
  return res.id;
}

/* ---------- τύπος content (delegate-aware) + όνομα ---------- */
async function effType(meta){
  if(!meta) return '';
  if(!meta.delegate) return meta.content_type||'';
  if(cache.etype.has(meta.id)) return cache.etype.get(meta.id);
  let t=meta.content_type||'';
  try{ const d=await ord.inscription(meta.delegate); t=d.content_type||t; }catch{}
  cache.etype.set(meta.id,t); return t;
}
async function displayName(id){
  if(cache.name.has(id)) return cache.name.get(id);
  let name=shortId(id);
  try{
    const m=await ord.inscription(id);
    const ct=await effType(m);
    if(/^text\/plain/.test(ct) && m.content_length>0 && m.content_length<=120){
      const t=(await ord.text(id,160)).trim().split('\n')[0].trim();
      if(t && t.length<=42 && /^[\x20-\x7eͰ-Ͽ·]+$/.test(t)) name=t;
    }
    cache.name.set(id,name);   // cache μόνο σε επιτυχία — όχι μόνιμο fallback σε σφάλμα δικτύου
  }catch{}
  return name;
}

/* ---------- lazy mounting ---------- */
const lazyFns=new WeakMap();
const io=new IntersectionObserver(entries=>{
  for(const e of entries){ if(e.isIntersecting){ io.unobserve(e.target);
    const fn=lazyFns.get(e.target); lazyFns.delete(e.target); if(fn) fn(); } }
},{rootMargin:'140px'});
function lazyMount(elm,fn){ lazyFns.set(elm,fn); io.observe(elm); }

/* ---------- real content rendering ---------- */
async function renderContent(container,id,{big=false,interactive=false}={}){
  container.innerHTML='';
  const ph=el('div','fillmedia textcard ph'); ph.textContent='…';
  container.appendChild(ph);
  let meta=null, ct='';
  try{ meta=await ord.inscription(id); ct=await effType(meta); }
  catch{ ph.textContent='⚠'; ph.classList.remove('ph'); return; }
  if(!container.contains(ph)) return;
  const url=ord.contentURL(id);
  const put=n=>{ if(container.contains(ph)) container.replaceChild(n,ph); };
  if(/^image\/svg|html/.test(ct)){
    const f=el('iframe','fillmedia'); f.setAttribute('sandbox','allow-scripts');
    f.setAttribute('scrolling','no'); f.loading='lazy'; f.src=url;
    if(interactive) f.style.pointerEvents='auto';   // στο Content pane το on-chain app ζει
    put(f);
  } else if(/^image\//.test(ct)){
    const im=el('img','fillmedia pix'); im.loading='lazy'; im.decoding='async'; im.alt='';
    im.onerror=()=>{ const t=el('div','fillmedia textcard'); t.textContent='⚠';
      if(im.parentNode===container) container.replaceChild(t,im); };
    im.src=url; put(im);
  } else if(/^video\//.test(ct)){
    const v=el('video','fillmedia'); v.muted=true; v.autoplay=true; v.loop=true;
    v.playsInline=true; v.preload='metadata'; v.src=url; put(v);
  } else if(/^audio\//.test(ct)){
    const w=el('div','fillmedia textcard'+(big?' big':'')); w.textContent='♪';
    if(big){ w.style.position='relative';
      const a=el('audio'); a.controls=true; a.src=url;
      a.style.cssText='position:absolute;left:8%;width:84%;bottom:14%;'; w.appendChild(a); }
    put(w);
  } else if(/^text\/|json|javascript|xml/.test(ct)){
    const t=el('div','fillmedia textcard'+(big?' big':''));
    if(meta.content_length>65536){ t.textContent=fmtBytes(meta.content_length)+' text'; put(t); return; }
    try{
      let s=await ord.text(id,big?1600:240);
      if(/json/.test(ct)){ try{ s=JSON.stringify(JSON.parse(s),null,1).slice(0,big?1600:240); }catch{} }
      t.textContent=s||'∅';
    }catch{ t.textContent='⚠'; }
    if(container.contains(ph)) put(t);
  } else {
    const f=el('iframe','fillmedia'); f.setAttribute('sandbox','allow-scripts');
    f.setAttribute('scrolling','no'); f.loading='lazy'; f.src=ord.previewURL(id);
    if(interactive) f.style.pointerEvents='auto';
    put(f);
  }
}

/* ---------- loader + toast ---------- */
let inflight=0; const loaderEl=$('#loader');
function tick(d){ inflight=Math.max(0,inflight+d); loaderEl.classList.toggle('on',inflight>0); }
async function withLoad(p){ tick(1); try{ return await p; } finally{ tick(-1); } }
function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('on');
  clearTimeout(toast._t); toast._t=setTimeout(()=>t.classList.remove('on'),2800); }

/* ---------- nav state + tabs ---------- */
const stack=[];
let cur=null, curChildren=[], curVersions=[], curVerIndex=0;
let currentPostIds=[], insideBatch=null;
let loadSeq=0;
function setTab(name){
  $$('.tab').forEach(t=>t.classList.toggle('on',t.dataset.tab===name));
  $$('.pane').forEach(p=>p.classList.toggle('on',p.id==='pane'+name));
}
$$('.tab').forEach(t=>t.onclick=()=>setTab(t.dataset.tab));

/* ---------- profile ---------- */
async function openProfile(id,{push=true,keepTab=false}={}){
  id=String(id).toLowerCase();
  // το seq δεσμεύεται ΠΡΙΝ το await — αλλιώς μια παλιά-αργή πλοήγηση
  // παίρνει νεότερο token και πατάει πάνω στη νεότερη
  const seq=++loadSeq;
  let info;
  try{ info=await withLoad(ord.inscription(id)); }
  catch{ toast('δεν βρέθηκε το inscription'); return false; }
  if(seq!==loadSeq) return false;   // ο χρήστης προχώρησε αλλού εν τω μεταξύ
  if(push) stack.push(id);
  cur=info;
  curChildren=[]; curVersions=[]; curVerIndex=0;
  currentPostIds=[]; insideBatch=null; collageSeq++;
  ancCount=null; followersPlus=false;
  $('#start').classList.add('gone');
  if(pv.classList.contains('on')) closePV();

  // ταυτότητα: top bar + content caption
  const setName=(box)=>{
    box.innerHTML='';
    const ns=el('span'); ns.textContent=shortId(id); box.appendChild(ns);
    const tp=el('span','type'); tp.textContent='…'; box.appendChild(tp);
    effType(info).then(ct=>{ if(seq===loadSeq) tp.textContent=(ct||'').split(';')[0].split('/')[1]||'data'; });
    displayName(id).then(n=>{ if(seq===loadSeq) ns.textContent=n; });
  };
  setName($('#tbN')); setName($('#cName'));
  $('#tbS').textContent='…';
  $('#cMeta').innerHTML=`<span><span class="k">#</span>${info.number}</span>`+
    (info.sat!=null?`<span><span class="k">sat</span> ${info.sat}</span>`:'')+
    `<span><span class="k">block</span> ${info.height}</span>`;
  // stats — tappable: following/followers ανοίγουν panel, posts πάει στην καρτέλα
  $('#cStats').innerHTML=
    `<button class="s" id="statFollowing"><b id="stFollowing">–</b><span>following</span></button>`+
    `<button class="s" id="statFollowers"><b id="stFollowers">–</b><span>followers</span></button>`+
    `<button class="s" id="statPosts"><b id="stPosts">–</b><span>posts</span></button>`;
  $('#statFollowing').onclick=()=>showFollowing();
  $('#statFollowers').onclick=()=>showFollowers();
  $('#statPosts').onclick=()=>setTab('Posts');
  $('#cTags').innerHTML='';
  closePanel();

  // content — το πραγματικό on-chain content (interactive: τα html apps ζουν εδώ)
  renderContent($('#bigmedia'), id, {big:true, interactive:true});

  // posts reset — spinner μέχρι να έρθει η πρώτη σελίδα children
  $('#grid').innerHTML='<div class="empty" id="gridPh"><span class="spin"></span></div>';
  $('#postsHdr').style.display='none';
  $('#tabPostsLb').textContent='posts';
  tileMap=new Map();

  // about reset
  $('#aMeta').innerHTML=''; $('#aVersSec').style.display='none';
  $('#aAnc').innerHTML='<div class="dimnote"><span class="spin"></span> φόρτωση…</div>';
  renderAboutMeta(info,seq);

  // ανεξάρτητα τμήματα, παράλληλα
  loadParents(id,seq);
  loadVersions(info,seq);
  loadChildrenAll(id,seq);
  loadAncestors(id,seq);

  if(!keepTab) setTab('Content');   // version switch κρατά την ενεργή καρτέλα
  return true;
}

/* tags = οι parents του content — tap: μετάβαση στον parent */
async function loadParents(id,seq){
  let res={ids:[],more:false};
  try{ res=await withLoad(ord.parents(id,0)); }catch{}
  if(seq!==loadSeq) return;
  const tg=$('#cTags');
  if(!res.ids.length){ tg.innerHTML='<span class="tag none">χωρίς parents — ρίζα</span>'; return; }
  tg.innerHTML='';
  for(const p of res.ids){
    const b=el('button','tag');
    const at=el('span','at'); at.textContent='@'; b.appendChild(at);
    const s=el('span'); s.textContent=shortId(p); b.appendChild(s);
    displayName(p).then(n=>{ s.textContent=n; });
    b.onclick=()=>openProfile(p);
    tg.appendChild(b);
  }
}

async function loadVersions(info,seq){
  const tv=$('#tbVer');
  tv.style.display='none';
  if(info.sat==null) return;
  let res={ids:[],more:false};
  try{ res=await withLoad(ord.sat(info.sat,0)); }catch{}
  if(seq!==loadSeq) return;
  curVersions=res.ids; curVerIndex=res.ids.indexOf(info.id);
  if(res.ids.length>1 && curVerIndex>=0){
    tv.style.display='';
    tv.textContent='v'+(curVerIndex+1)+'/'+res.ids.length+(res.more?'+':'');
    // ένδειξη + συντόμευση: το tap οδηγεί στις ρητές εκδοχές του About —
    // όχι κρυφό silent switch
    tv.onclick=()=>setTab('About');
    renderAboutVersions(seq);
  }
}

/* όλα τα children, όλες οι σελίδες — αυτόματα, χωρίς κουμπιά· ακριβή νούμερα */
let childrenLoading=false;
async function loadChildrenAll(id,seq){
  childrenLoading=true;
  const seen=new Set(curChildren);
  const MAX_PAGES=200;
  let page=Math.floor(curChildren.length/100), more=true, failed=false;
  while(more && page<MAX_PAGES){
    let res; try{ res=await withLoad(ord.children(id,page)); }catch{ failed=true; break; }
    if(seq!==loadSeq) return;
    const fresh=res.ids.filter(x=>!seen.has(x));
    fresh.forEach(x=>seen.add(x));
    curChildren.push(...fresh);
    more=res.more;
    if(!insideBatch){
      appendChildIds($('#grid'),fresh);
      currentPostIds=curChildren.slice();
      // ο viewer βλέπει τη ζωντανή λίστα — όχι παγωμένο snapshot
      if(pv.classList.contains('on')){ vList=currentPostIds.slice();
        $('#pvPos').textContent=(vIndex+1)+' / '+vList.length; }
    }
    updateCounts(seq,more);
    page++;
  }
  if(seq!==loadSeq) return;
  childrenLoading=false;
  const truncated=more&&!failed;
  if(failed) toast('σφάλμα δικτύου — μερική λίστα posts');
  if(truncated) toast('σταμάτησα στα '+curChildren.length+' children');
  updateCounts(seq,false,truncated);
  if(!curChildren.length && !insideBatch){
    const grid=$('#grid');
    if(failed){
      grid.innerHTML='';
      const d=el('div','empty'); d.textContent='σφάλμα δικτύου — ';
      const b=el('button'); b.textContent='δοκίμασε ξανά ↻';
      b.style.cssText='color:var(--aqua);text-decoration:underline;text-underline-offset:2px;';
      b.onclick=()=>{ grid.innerHTML='<div class="empty" id="gridPh"><span class="spin"></span></div>';
        loadChildrenAll(id,seq); };
      d.appendChild(b); grid.appendChild(d);
    } else grid.innerHTML='<div class="empty">δεν έχει posts — φύλλο του δέντρου</div>';
  }
  // ρηχό probe: βαθύτεροι απόγονοι → «+» στους followers
  for(const c of curChildren.slice(0,8)){
    try{ const k=await ord.childCount(c); if(seq!==loadSeq) return;
      if(k.n>0){ followersPlus=true;
        const f=$('#stFollowers'); if(f) f.innerHTML=curChildren.length+'<span class="plus">+</span>';
        updateTbS(seq); return; }
    }catch{}
  }
}
function updateCounts(seq,loading,truncated=false){
  if(seq!==loadSeq) return;
  const t=curChildren.length, suf=loading?'…':(truncated?'+':'');
  const sf=$('#stFollowers'), sp=$('#stPosts');
  if(sf) sf.textContent=t+suf;
  if(sp) sp.textContent=t+suf;
  $('#tabPostsLb').innerHTML='posts'+(t?` <span class="badge">${t}${suf}</span>`:'');
  updateTbS(seq);
}
let ancCount=null, followersPlus=false;
function updateTbS(seq){
  if(seq!==loadSeq) return;
  const a=ancCount==null?'…':ancCount;
  $('#tbS').textContent=`${a} following · ${curChildren.length}${followersPlus?'+':''} followers`;
}
async function loadAncestors(id,seq){
  const chain=[]; let node=id;
  for(let g=0; g<60; g++){
    let ps; try{ ps=await ord.parents(node,0); }catch{ break; }
    if(seq!==loadSeq) return;
    if(!ps.ids.length) break;
    chain.push(ps.ids[0]); node=ps.ids[0];
  }
  if(seq!==loadSeq) return;   // μην γράψεις stale πάνω στο νέο προφίλ
  ancCount=chain.length;
  const sf=$('#stFollowing'); if(sf) sf.textContent=chain.length;
  updateTbS(seq);
  renderAncestors(chain,seq);
}

/* ---------- posts grid: incremental ομαδοποίηση batch ανά txid ---------- */
let tileMap=new Map();
function appendChildIds(grid,ids){
  const ph=document.getElementById('gridPh'); if(ph) ph.remove();
  for(const id of ids){
    const tx=txidOf(id);
    let g=tileMap.get(tx);
    if(!g){
      g={ ids:[id], batch:false, cell:buildTile(id), badge:null };
      tileMap.set(tx,g);
      grid.appendChild(g.cell);
    } else {
      g.ids.push(id);
      if(!g.batch) upgradeToBatch(grid,g);
      else g.badge.textContent='▦ '+g.ids.length;
    }
  }
}
function buildTile(id){
  const cell=el('div','cell');
  const th=el('div','thumb'); cell.appendChild(th);
  lazyMount(cell,()=>{
    renderContent(th,id);
    ord.childCount(id).then(k=>{
      if(k.n>0){ const b=el('div','kids'); b.textContent='↳ '+k.n+(k.more?'+':''); cell.appendChild(b); }
    }).catch(()=>{});
  });
  cell.onclick=()=>openPV(id);
  return cell;
}
function upgradeToBatch(grid,g){
  g.batch=true;
  const first=g.ids.slice().sort((a,b)=>idxOf(a)-idxOf(b))[0];
  const cell=el('div','cell batch');
  const th=el('div','thumb'); cell.appendChild(th);
  lazyMount(cell,()=>renderContent(th,first));          // μόνο το 1ο content
  g.badge=el('div','bg'); g.badge.textContent='▦ '+g.ids.length; cell.appendChild(g.badge);
  cell.onclick=()=>openCollage(g.ids.slice().sort((a,b)=>idxOf(a)-idxOf(b)));
  grid.replaceChild(cell,g.cell);
  g.cell=cell;
}
function renderPostsGrid(){
  const grid=$('#grid');
  grid.innerHTML=''; tileMap=new Map();
  $('#postsHdr').style.display='none';
  insideBatch=null;
  currentPostIds=curChildren.slice();
  if(!curChildren.length){ grid.innerHTML='<div class="empty">δεν έχει posts — φύλλο του δέντρου</div>'; return; }
  appendChildIds(grid,curChildren);
}

/* ---------- collage: ΟΛΟ το reveal tx, i0 → τελευταίο index ---------- */
let collageSeq=0;
async function openCollage(ids){
  const seq=++collageSeq;
  const tx=txidOf(ids[0]);
  const known=new Set(ids);
  insideBatch=[];
  const grid=$('#grid'); grid.innerHTML='';
  const hdr=$('#postsHdr'); hdr.style.display='flex';
  hdr.innerHTML=`<button class="bch" id="batchBack">‹ πίσω στα posts</button><span class="bt" id="batchCount"></span>`;
  $('#batchBack').onclick=()=>{ collageSeq++; renderPostsGrid(); };
  const cnt=$('#batchCount');
  const addCell=id=>{
    const cell=buildTile(id);
    const c=el('div','idxchip'); c.textContent='i'+idxOf(id); cell.appendChild(c);
    grid.appendChild(cell);
  };
  let k=0; const MAX=10000;
  while(k<MAX){
    if(seq!==collageSeq) return;
    const mid=tx+'i'+k;
    let exists=known.has(mid);
    if(!exists){
      try{ await withLoad(ord.inscription(mid)); exists=true; }catch{ exists=false; }
      if(seq!==collageSeq) return;
    }
    if(!exists) break;
    insideBatch.push(mid); currentPostIds=insideBatch.slice();
    addCell(mid);
    cnt.textContent=insideBatch.length+' · tx '+shortId(tx)+' …';
    k++;
  }
  if(seq!==collageSeq) return;
  cnt.textContent=insideBatch.length+' inscriptions · tx '+shortId(tx);
}

/* ---------- post viewer ---------- */
const pv=$('#pv');
let vList=[], vIndex=0, vId=null, pvSeq=0;
function openPV(id){
  vList=currentPostIds.slice();
  vIndex=Math.max(0,vList.indexOf(id));
  pv.classList.add('on');
  loadPV();
}
function closePV(){ pvSeq++; pv.classList.remove('on'); $('#pvMedia').innerHTML=''; }
async function loadPV(){
  vId=vList[vIndex]; const seq=++pvSeq;
  $('#pvPos').textContent=(vIndex+1)+' / '+vList.length;
  let info; try{ info=await withLoad(ord.inscription(vId)); }
  catch{
    if(seq===pvSeq){ toast('σφάλμα δικτύου');
      const m=$('#pvMedia'); m.innerHTML='';
      const t=el('div','fillmedia textcard big'); t.textContent='⚠'; m.appendChild(t);
      $('#pvName').textContent=''; $('#pvMeta').textContent='—'; }
    return;
  }
  if(seq!==pvSeq) return;
  renderContent($('#pvMedia'), vId, {big:true});
  const box=$('#pvName'); box.innerHTML='';
  const ns=el('span'); ns.textContent=shortId(vId); box.appendChild(ns);
  const tp=el('span','type'); tp.textContent='…'; box.appendChild(tp);
  effType(info).then(ct=>{ if(seq===pvSeq) tp.textContent=(ct||'').split(';')[0].split('/')[1]||'data'; });
  displayName(vId).then(n=>{ if(seq===pvSeq) ns.textContent=n; });
  $('#pvMeta').textContent='#'+info.number+(info.sat!=null?' · sat '+info.sat:'');
  ord.childCount(vId).then(k=>{
    if(seq!==pvSeq) return;
    $('#pvMeta').textContent='#'+info.number+(info.sat!=null?' · sat '+info.sat:'')+' · ↳ '+k.n+(k.more?'+':'');
  }).catch(()=>{});
}
function pvEnter(){ const id=vId; closePV(); openProfile(id); }
$('#pvBack').onclick=closePV;
$('#pvEnter').onclick=pvEnter;
(function pvGestures(){
  let sx=0,sy=0,down=false;
  const s=e=>{ down=true; const p=e.touches?e.touches[0]:e; sx=p.clientX; sy=p.clientY; };
  const en=e=>{ if(!down)return; down=false; const p=e.changedTouches?e.changedTouches[0]:e;
    const dx=p.clientX-sx, dy=p.clientY-sy, ax=Math.abs(dx), ay=Math.abs(dy);
    if(ax<40&&ay<40) return;
    if(ay>ax){ if(dy<0&&vIndex<vList.length-1){vIndex++;loadPV();} else if(dy>0&&vIndex>0){vIndex--;loadPV();} } };
  pv.addEventListener('touchstart',s,{passive:true}); pv.addEventListener('mousedown',s);
  pv.addEventListener('touchend',en); pv.addEventListener('mouseup',en);
})();
document.addEventListener('keydown',e=>{
  if(e.key==='Escape' && panel.classList.contains('on')){ closePanel(); return; }
  if(!pv.classList.contains('on')) return;
  if(e.key==='ArrowDown'&&vIndex<vList.length-1){ vIndex++; loadPV(); }
  else if(e.key==='ArrowUp'&&vIndex>0){ vIndex--; loadPV(); }
  else if(e.key==='Escape') closePV();
});

/* ---------- about ---------- */
function renderAboutMeta(info,seq){
  const rows=[
    ['inscription id',info.id],
    ['number','#'+info.number],
    ['sat',info.sat!=null?info.sat:'—'],
    ['content type',info.content_type||'—'],
    ['content length',info.content_length!=null?fmtBytes(info.content_length):'—'],
    ['reveal block',info.height],
    ['timestamp',dateFmt(info.timestamp)],
    ['fee',info.fee+' sats'],
    ['output value',info.value!=null?info.value+' sats':'—'],
    ['address',info.address||'—'],
  ];
  if(info.delegate) rows.push(['delegate',info.delegate]);
  if(info.charms&&info.charms.length) rows.push(['charms',info.charms.join(' · ')]);
  $('#aMeta').innerHTML=rows.map(([k,v])=>
    `<div class="kv"><span class="k">${esc(k)}</span><span class="v">${esc(String(v))}</span></div>`).join('');
  ord.childCount(info.id).then(k=>{
    if(seq!==loadSeq) return;
    $('#aMeta').insertAdjacentHTML('beforeend',
      `<div class="kv"><span class="k">children</span><span class="v">${k.n}${k.more?'+':''}</span></div>`);
  }).catch(()=>{});
}
function renderAboutVersions(seq){
  const sec=$('#aVersSec'), row=$('#aVers');
  sec.style.display=''; row.innerHTML='';
  curVersions.forEach((id,i)=>{
    const b=el('button','verchip2'+(i===curVerIndex?' on':''));
    b.textContent='v'+(i+1)+' · '+shortId(id);
    displayName(id).then(n=>{ b.textContent='v'+(i+1)+' · '+n; });
    b.onclick=()=>{ stack[stack.length-1]=id; openProfile(id,{push:false,keepTab:true}); };
    row.appendChild(b);
  });
}
function renderAncestors(chain,seq){
  const box=$('#aAnc');
  if(seq!==loadSeq) return;
  if(!chain.length){ box.innerHTML='<div class="dimnote">είναι η ρίζα — κανένας πρόγονος</div>'; return; }
  box.innerHTML='';
  chain.forEach((aid,i)=>{
    const row=el('div','lin');
    const av=el('div','av'); row.appendChild(av);
    const nbox=el('div','n');
    const t=el('div','t'); t.textContent=shortId(aid); nbox.appendChild(t);
    const s=el('div','s'); s.textContent='…'; nbox.appendChild(s);
    row.appendChild(nbox);
    const lvl=el('div','lvl'); lvl.textContent='+'+(i+1)+'↑'; row.appendChild(lvl);
    lazyMount(row,()=>{
      renderContent(av,aid);
      displayName(aid).then(n=>{ t.textContent=n; });
      ord.inscription(aid).then(m=>{ s.textContent='#'+m.number+' · '+((m.content_type||'?').split(';')[0]); })
        .catch(()=>{ s.textContent='—'; });
    });
    row.onclick=()=>openProfile(aid);
    box.appendChild(row);
  });
}

/* ---------- slide-up panel: followers / following (από την πλήρη έκδοση) ---------- */
const panel=$('#panel'), scrim=$('#scrim');
let panelSeq=0;
function openPanel(){ panel.classList.add('on'); scrim.classList.add('on'); }
function closePanel(){ panel.classList.remove('on'); scrim.classList.remove('on'); panelSeq++; }
scrim.onclick=closePanel; $('#panelClose').onclick=closePanel;

function rowEl(id){
  const row=el('div','row');
  const av=el('div','av'); row.appendChild(av);
  const info=el('div','info');
  const n=el('div','n'); n.textContent=shortId(id); info.appendChild(n);
  const s=el('div','s'); s.textContent='…'; info.appendChild(s);
  row.appendChild(info);
  const d=el('div','depth'); row.appendChild(d);
  lazyMount(row,()=>{                      // requests μόνο όταν φανεί η γραμμή
    renderContent(av,id);
    displayName(id).then(x=>{ n.textContent=x; });
    ord.inscription(id).then(m=>{ s.textContent='#'+m.number+' · '+((m.content_type||'?').split(';')[0]); })
      .catch(()=>{ s.textContent='—'; });
    ord.childCount(id).then(k=>{ if(k.n) d.textContent='↳ '+k.n+(k.more?'+':''); }).catch(()=>{});
  });
  row.onclick=()=>{ closePanel(); openProfile(id); };
  return row;
}
function fillRows(container,ids){
  container.innerHTML='';
  for(const id of ids) container.appendChild(rowEl(id));
}

async function showFollowers(){
  if(!cur) return;
  const seq=++panelSeq;
  $('#panelTitle').textContent='followers · απόγονοι';
  openPanel();
  const body=$('#panelBody');
  body.innerHTML=
    `<div class="counting">άμεσα children: <b>${curChildren.length}${childrenLoading?'…':''}</b></div>`+
    `<div id="frows"></div>`+
    (curChildren.length?`<button class="loadall" id="loadAll">φόρτωσε όλους τους απογόνους ↓</button>`:'');
  if(!curChildren.length){
    body.querySelector('.counting').textContent=childrenLoading?'φόρτωση…':'κανένα child — φύλλο';
    return;
  }
  fillRows($('#frows'),curChildren);
  $('#loadAll').onclick=async()=>{
    const btn=$('#loadAll'); btn.disabled=true; btn.innerHTML='<span class="spin"></span> μέτρηση…';
    const MAX=1500;
    const all=[]; const seen=new Set([cur.id]); const q=[cur.id];
    let truncated=false;
    while(q.length && !truncated){
      if(seq!==panelSeq) return;           // το panel έκλεισε — σταμάτα το BFS
      const nid=q.shift();
      let page=0, more=true;
      while(more && !truncated){
        let r; try{ r=await ord.children(nid,page); }catch{ break; }
        if(seq!==panelSeq) return;
        for(const c of r.ids){
          if(!seen.has(c)){ seen.add(c); all.push(c); q.push(c); }
          if(all.length>=MAX){ truncated=true; break; }
        }
        more=r.more; page++;
        btn.innerHTML='<span class="spin"></span> '+all.length+' απόγονοι…';
      }
    }
    $('#panelTitle').textContent='followers · '+all.length+(truncated?'+':'')+' απόγονοι';
    body.querySelector('.counting').innerHTML='σύνολο απογόνων: <b>'+all.length+(truncated?'+</b> (όριο '+MAX+')':'</b>');
    btn.remove();
    fillRows($('#frows'),all);
  };
}

async function showFollowing(){
  if(!cur) return;
  const seq=++panelSeq;
  $('#panelTitle').textContent='following · πρόγονοι';
  openPanel();
  const body=$('#panelBody');
  body.innerHTML='<div class="counting"><span class="spin"></span> αναδρομή προς τη ρίζα…</div><div id="frows"></div>';
  const chain=[]; let node=cur.id;
  for(let g=0; g<60; g++){
    let ps; try{ ps=await ord.parents(node,0); }catch{ break; }
    if(seq!==panelSeq) return;
    if(!ps.ids.length) break;
    chain.push(ps.ids[0]); node=ps.ids[0];
  }
  if(seq!==panelSeq) return;
  body.querySelector('.counting').innerHTML=chain.length
    ? ('αλυσίδα προγόνων: <b>'+chain.length+'</b> ως τη ρίζα')
    : 'είναι η ρίζα — κανένας πρόγονος';
  fillRows($('#frows'),chain);
}

/* ---------- back ---------- */
let backBusy=false;
$('#back').onclick=async()=>{
  if(backBusy) return;
  if(stack.length>1){
    backBusy=true;
    const prev=stack[stack.length-2];
    const ok=await openProfile(prev,{push:false});
    if(ok) stack.pop();               // η καταχώρηση φεύγει μόνο αν πέτυχε η πλοήγηση
    backBusy=false;
  } else {
    loadSeq++; collageSeq++;
    if(pv.classList.contains('on')) closePV();
    closePanel();
    $('#bigmedia').innerHTML=''; $('#grid').innerHTML='';
    $('#start').classList.remove('gone');
    stack.length=0;
  }
};

/* ---------- start: ΜΟΝΟ αριθμός bitmap ---------- */
async function begin(raw){
  const goBtn=$('#enter');
  if(goBtn.disabled) return;               // ήδη τρέχει αναζήτηση (Enter/example)
  const err=$('#startErr'); err.textContent=''; err.classList.remove('busy');
  const val=(raw||$('#bm').value).trim().toLowerCase().replace(/\.bitmap$/,'');
  if(!val) return;
  if(!/^\d+$/.test(val)){ err.textContent='δώσε αριθμό bitmap — π.χ. 800000'; return; }
  goBtn.disabled=true;
  err.classList.add('busy');
  err.textContent='on-chain index: '+val+'.bitmap…';
  let id;
  try{ id=await withLoad(getBitmapInscriptionId(parseInt(val,10))); err.textContent=''; }
  catch(e){ err.classList.remove('busy');
    err.textContent=(e&&e.message)?e.message:'σφάλμα αναζήτησης'; goBtn.disabled=false; return; }
  err.classList.remove('busy');
  stack.length=0;
  const ok=await openProfile(id);
  goBtn.disabled=false;
  if(!ok) err.textContent='δεν βρέθηκε το inscription στο ordinals.com';
}
$('#enter').onclick=()=>begin();
$('#bm').addEventListener('keydown',e=>{ if(e.key==='Enter') begin(); });
$$('#start .examples span').forEach(s=>s.onclick=()=>{ $('#bm').value=s.dataset.ex; begin(); });
</script>
